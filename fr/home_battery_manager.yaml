      {{ ((trigger_to_house_power_w | float(0)) - (trigger_from_house_power_w | float(0))) | abs }}
    {% else %}
      none
    {% endif %}
  should_skip_small_house_power_delta: >-
    {% if not triggered_by_house_power_sensor %}
