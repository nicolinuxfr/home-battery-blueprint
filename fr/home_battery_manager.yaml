  - alias: "Garde-fou heures creuses actions seules"
    choose:
      - alias: "Heures creuses actives"
        conditions:
          - condition: template
            value_template: "{{ off_peak_active }}"
        sequence:
          - alias: "Arrêt après les actions de charge nocturne"
            stop: "Heures creuses actives : les actions de charge nocturne ont été traitées, le pilotage normal des consignes est ignoré."

  - alias: "Validation et garde-fous capteur"
    choose:
      - alias: "Faible variation de puissance maison"
        conditions:
          - condition: template
            value_template: "{{ should_stop_small_house_power_delta }}"
        sequence:
          - alias: "Arrêt sur faible variation de puissance maison"
            stop: >-
              Variation du capteur de puissance maison sous le seuil de déclenchement :
              {{ house_power_trigger_delta_w | float(0) | round(1) }} W < {{ control_deadband_w | float(0) | round(1) }} W.

      - alias: "Capteur de puissance maison invalide"
        conditions:
          - condition: template
            value_template: "{{ operating_mode == 'invalid_sensor' }}"
        sequence:
          - alias: "Arrêt sur erreur capteur"
            stop: >-
              Le capteur de puissance maison {{ house_power_sensor }} est indisponible ou non numérique.
  # Generated slot actions keep the signed target entity updated and
  # optionally run active-mode custom actions for charge/discharge integrations.
  - alias: "Batterie 1: mettre à jour la consigne signée"
    choose:
      - alias: "Batterie 1: mise à jour de consigne nécessaire"
        conditions:
          - condition: template
            value_template: "{{ should_write_target_power_1 }}"
          - condition: template
            value_template: "{{ house_power_valid }}"
        sequence:
          - alias: "Batterie 1: préparer le contexte de mise à jour"
            variables:
              battery_slot: 1
              battery_soc: "{{ slot_1_soc }}"
              house_power_w: "{{ house_power_w }}"
              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_1 | float(0) }}"
              target_discharge_w: "{{ discharge_target_1 | float(0) }}"
              target_charge_w: "{{ charge_target_1 | float(0) }}"
              target_power_value: >-
                {% set signed = signed_target_1 | float(0) %}
                {% if battery_1_target_power_uses_absolute_value | bool %}
                  {{ signed | abs | round(0) | int(0) }}
                {% else %}
                  {{ signed | round(0) | int(0) }}
                {% endif %}
          - alias: "Batterie 1: sélectionner le service de consigne"
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ battery_1_target_power_entity.startswith('number.') }}"
                sequence:
                  - alias: "Batterie 1: écrire la consigne dans l'entité number"
                    action: number.set_value
                    continue_on_error: true
                    target:
                      entity_id: "{{ battery_1_target_power_entity }}"
                    data:
                      value: >-
                        {% set entity_min = state_attr(battery_1_target_power_entity, 'min') %}
                        {% if target_power_value | int(0) > 0
                              and entity_min is number
                              and entity_min | float(0) > 0
                              and target_power_value | int(0) < entity_min | float(0) %}
                          {% if house_power_w | float(0) < 0 %}
                            0
                          {% else %}
                            {{ entity_min | float(0) | round(0) | int(0) }}
                          {% endif %}
                        {% else %}
                          {{ target_power_value | int(0) }}
                        {% endif %}
              - conditions:
                  - condition: template
                    value_template: "{{ battery_1_target_power_entity.startswith('input_number.') }}"
                sequence:
                  - alias: "Batterie 1: écrire la consigne dans l'entité input_number"
                    action: input_number.set_value
                    continue_on_error: true
                    target:
                      entity_id: "{{ battery_1_target_power_entity }}"
                    data:
                      value: >-
                        {% set entity_min = state_attr(battery_1_target_power_entity, 'min') %}
                        {% if target_power_value | int(0) > 0
                              and entity_min is number
                              and entity_min | float(0) > 0
                              and target_power_value | int(0) < entity_min | float(0) %}
                          {% if house_power_w | float(0) < 0 %}
                            0
                          {% else %}
                            {{ entity_min | float(0) | round(0) | int(0) }}
                          {% endif %}
                        {% else %}
                          {{ target_power_value | int(0) }}
                        {% endif %}
