        {% elif battery.slot == 4 %}
          {% set battery_discharge_target = discharge_targets['4'] | float(0) %}
        {% endif %}
        {% if battery.charge_locked
              and (operating_mode == 'charge' or battery_discharge_target < control_deadband_w | float(0)) %}
          {% set allocation = [battery.current_charge, battery.max_charge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% set battery_discharge_target = 0 %}
        {% if battery.slot == 1 %}
          {% set battery_discharge_target = discharge_targets['1'] | float(0) %}
        {% elif battery.slot == 2 %}
          {% set battery_discharge_target = discharge_targets['2'] | float(0) %}
        {% elif battery.slot == 3 %}
          {% set battery_discharge_target = discharge_targets['3'] | float(0) %}
        {% elif battery.slot == 4 %}
          {% set battery_discharge_target = discharge_targets['4'] | float(0) %}
        {% endif %}
        {% if ns.remaining > 0
              and not battery.charge_locked
