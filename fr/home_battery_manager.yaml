  triggered_by_house_power_sensor: "{{ trigger_entity_id == house_power_sensor }}"
  triggered_by_start_or_reload: >-
    {{ trigger is defined
       and trigger.platform in ['homeassistant', 'event'] }}
  off_peak_trigger_entered_active: >-
    {% if triggered_by_off_peak_entity and trigger is defined and trigger.to_state is not none %}
      {{ trigger.to_state.state == 'on' }}
    {% else %}
      false
    {% endif %}
  trigger_from_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.from_state is not none %}
      {% set value = trigger.from_state.state %}
      {% if is_number(value) %}
        {{ value | float(0) }}
      {% else %}
        none
      {% endif %}
    {% else %}
      none
    {% endif %}
  trigger_to_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.to_state is not none %}
