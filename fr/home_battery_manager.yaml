              mode: slider
        battery_4_target_power_entity:
          name: "Entité de consigne de puissance"
          description: "Entité `number` ou `input_number` écrite par le blueprint. La consigne est signée en watts : positive pour décharger, négative pour charger, `0` pour s'arrêter. Si la batterie doit charger, l'entité choisie doit accepter les valeurs négatives."
          default: ""
          selector:
            entity:
              filter:
                - domain: number
                - domain: input_number
        battery_4_target_power_uses_absolute_value:
          name: "L'entité de consigne utilise des valeurs absolues"
          description: "Active cette option quand l'entité de consigne attend une puissance positive en charge comme en décharge. Le blueprint garde une consigne signée en interne, mais écrit la valeur absolue dans cette entité. Utilise les actions de charge et de décharge pour choisir le mode batterie quand l'intégration a besoin d'un contrôle de direction séparé."
          default: false
          selector:
            boolean: {}
        battery_4_actual_power_sensor:
          name: "Capteur de puissance réelle"
          description: "Capteur de puissance optionnel qui remonte la puissance réellement délivrée par la batterie en watts. L'allocateur continue d'utiliser l'entité de consigne et le compteur maison comme boucle principale. Après le délai de réponse, une mesure valide non périmée sert uniquement de garde-fou pour éviter de compter une batterie comme apport réel quand elle ne délivre plus. Une mesure périmée n'empêche pas une batterie au repos de démarrer. Si la télémétrie reste périmée après qu'une consigne active a eu le temps de produire un effet, cette batterie est exclue des allocations de décharge additionnelles tandis que sa consigne déjà active peut rester en place sauf arrêt, changement de signe ou export réel imposant une correction."
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: power
        battery_4_discharge_actions:
          name: "Actions de décharge"
          description: "Actions personnalisées optionnelles exécutées quand cette batterie doit décharger activement, puis à nouveau quand elle devrait s'arrêter mais remonte encore une décharge physique. Elles tournent à chaque mise à jour active de consigne en décharge. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w et export_surplus_w sont disponibles dans ces actions ; les variables de consigne sont initialisées globalement puis remplacées par les valeurs du slot courant avant cette séquence."
          default: []
          selector:
            action: {}
        battery_4_charge_actions:
          name: "Actions de charge"
          description: "Actions personnalisées optionnelles exécutées quand cette batterie doit charger pour absorber un surplus exporté, puis à nouveau quand elle devrait s'arrêter mais remonte encore une charge physique. Elles tournent à chaque mise à jour active de consigne en charge. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w et export_surplus_w sont disponibles dans ces actions ; les variables de consigne sont initialisées globalement puis remplacées par les valeurs du slot courant avant cette séquence."
          default: []
          selector:
            action: {}
        battery_4_night_charge_actions:
          name: "Actions de charge nocturne"
          description: "Actions personnalisées optionnelles exécutées quand les heures creuses deviennent actives, ainsi qu'au démarrage de Home Assistant ou au rechargement des automatisations si une période heures creuses est déjà active. Utilise-les pour placer cette batterie dans son mode de charge nocturne ; tant que les heures creuses restent actives, les écritures normales de consigne et les actions charge/décharge sont ignorées après leur exécution. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w, export_surplus_w et off_peak_active sont disponibles dans ces actions."
          default: []
          selector:
            action: {}

mode: restart

triggers:
  - trigger: homeassistant
    event: start
  - trigger: event
    event_type: automation_reloaded
  - trigger: state
    entity_id: !input house_power_sensor
    not_to: null
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "00:00:15"
  - trigger: state
    entity_id: !input off_peak_entities
    from: "on"

