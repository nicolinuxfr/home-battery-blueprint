blueprint:
  name: "Gestion de batteries domestiques (2026.4.9)"
  description: |-
    Blueprint Home Assistant générique pour piloter jusqu'à quatre batteries. Il répartit la décharge selon la demande maison, peut déclencher une charge opportuniste en cas d'export réel, suspend le pilotage normal des consignes pendant les heures creuses pour lancer les actions de charge nocturne, et écrit pour chaque batterie une consigne de puissance signée dans une entité numérique, avec des actions optionnelles pour les intégrations qui ont besoin d'un mode séparé.

    Version : 2026.4.9 - [Changelog](https://github.com/nicolinuxfr/home-battery-blueprint/blob/main/CHANGELOG.md#202649)
  domain: automation
  source_url: https://github.com/nicolinuxfr/home-battery-blueprint
  homeassistant:
    min_version: 2024.6.0
  input:
    house_power_sensor:
      name: "Capteur de puissance maison"
      description: "Capteur principal de puissance maison. Ce sélecteur n'affiche que les capteurs de puissance. Utilise un capteur signé en watts avec des valeurs positives en import et négatives en export."
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    off_peak_entities:
      name: "Entités heures creuses actives"
      description: "Entités optionnelles qui passent à on pendant les heures creuses. Si au moins une entité sélectionnée reste à on pendant 15 secondes, le blueprint arrête le pilotage normal des consignes et exécute les actions de charge nocturne configurées. La sortie de l'état on est traitée immédiatement."
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
            - domain: input_boolean
            - domain: schedule
    # Each battery slot is driven through a signed numeric target entity.
    # Optional active-mode actions can translate that target to vendor-specific controls.
    # Generated SoC selectors are limited to battery percentage sensors.
    battery_1_section:
      name: "Batterie 1"
      icon: mdi:battery
      collapsed: true
      input:
        battery_1_soc_sensor:
          name: "Capteur d'état de charge"
          description: "Laisse ce champ vide pour ignorer ce slot. Sinon, ce sélecteur n'affiche que les capteurs de batterie qui remontent un pourcentage de charge, et le capteur choisi active le slot. Un slot activé doit aussi exposer une entité numérique de consigne et au moins une limite de puissance non nulle."
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: battery
        battery_1_max_discharge_w:
          name: "Puissance maximale de décharge"
          description: "Limite de décharge saisie manuellement et utilisée par l'algorithme d'allocation pour cette batterie."
          default: 0
          selector:
            number:
              min: 0
              max: 5000
              step: 10
              unit_of_measurement: W
              mode: box
        battery_1_min_discharge_soc_pct:
          name: "État de charge minimum pour décharger"
          description: "État de charge minimum requis pour attribuer de la puissance de décharge à cette batterie. Si la batterie passe sous ce seuil, le blueprint l'exclut de l'allocation de décharge et écrit 0 si elle garde encore une consigne de décharge active."
          default: 15
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        battery_1_max_charge_w:
          name: "Puissance maximale de charge"
          description: "Limite de charge saisie manuellement et utilisée pour la charge opportuniste depuis un export réel. Mets 0 si cette batterie ne doit jamais être chargée par le blueprint."
          default: 0
          selector:
            number:
              min: 0
              max: 5000
              step: 10
              unit_of_measurement: W
              mode: box
        battery_1_reactive:
          name: "Batterie réactive"
          description: "Active cette option pour rendre la batterie réactive : elle sera ajustée fréquemment pour absorber les variations résiduelles de demande et récupérer l'export dès que possible. Laisse cette option désactivée (par défaut) pour un comportement stable où la batterie garde une consigne constante et laisse les batteries réactives gérer les fluctuations."
          default: false
          selector:
            boolean: {}
        battery_1_cooldown_seconds:
          name: "Cooldown de commande"
          description: "Délai minimal entre deux mises à jour actives de consigne pour cette batterie. Un cooldown court fonctionne mieux avec les batteries réactives pour absorber rapidement les variations résiduelles. Un cooldown plus long maintient la consigne plus stable. Mets 0 pour supprimer complètement ce délai. Un passage à `0` reste immédiat pour permettre un arrêt de sécurité. Les batteries réactives peuvent redémarrer depuis `0` immédiatement quand le compteur maison brut confirme un import ou export correspondant. Les batteries non réactives attendent leur cooldown avant de redémarrer depuis `0`, tandis qu’un export brut peut toujours réduire une consigne de décharge active avant la fin du cooldown."
          default: 0
          selector:
            number:
              min: 0
              max: 300
              step: 5
              unit_of_measurement: s
              mode: slider
        battery_1_target_power_entity:
          name: "Entité de consigne de puissance"
          description: "Entité `number` ou `input_number` écrite par le blueprint. La consigne est signée en watts : positive pour décharger, négative pour charger, `0` pour s'arrêter. Si la batterie doit charger, l'entité choisie doit accepter les valeurs négatives."
          default: ""
          selector:
            entity:
              filter:
                - domain: number
                - domain: input_number
        battery_1_target_power_uses_absolute_value:
          name: "L'entité de consigne utilise des valeurs absolues"
          description: "Active cette option quand l'entité de consigne attend une puissance positive en charge comme en décharge. Le blueprint garde une consigne signée en interne, mais écrit la valeur absolue dans cette entité. Utilise les actions de charge et de décharge pour choisir le mode batterie quand l'intégration a besoin d'un contrôle de direction séparé."
          default: false
          selector:
            boolean: {}
        battery_1_actual_power_sensor:
          name: "Capteur de puissance réelle"
          description: "Capteur de puissance optionnel qui remonte la puissance réellement délivrée par la batterie en watts. L'allocateur continue d'utiliser l'entité de consigne et le compteur maison comme boucle principale. Après le délai de réponse, une mesure valide non périmée sert uniquement de garde-fou pour éviter de compter une batterie comme apport réel quand elle ne délivre plus. Une mesure périmée n'empêche pas une batterie au repos de démarrer. Si la télémétrie reste périmée après qu'une consigne active a eu le temps de produire un effet, cette batterie est exclue des allocations de décharge additionnelles tandis que sa consigne déjà active peut rester en place sauf arrêt, changement de signe ou export réel imposant une correction."
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: power
        battery_1_discharge_actions:
          name: "Actions de décharge"
          description: "Actions personnalisées optionnelles exécutées quand cette batterie doit décharger activement, puis à nouveau quand elle devrait s'arrêter mais remonte encore une décharge physique. Elles tournent à chaque mise à jour active de consigne en décharge. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w et export_surplus_w sont disponibles dans ces actions ; les variables de consigne sont initialisées globalement puis remplacées par les valeurs du slot courant avant cette séquence."
          default: []
          selector:
            action: {}
        battery_1_charge_actions:
          name: "Actions de charge"
          description: "Actions personnalisées optionnelles exécutées quand cette batterie doit charger pour absorber un surplus exporté, puis à nouveau quand elle devrait s'arrêter mais remonte encore une charge physique. Elles tournent à chaque mise à jour active de consigne en charge. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w et export_surplus_w sont disponibles dans ces actions ; les variables de consigne sont initialisées globalement puis remplacées par les valeurs du slot courant avant cette séquence."
          default: []
          selector:
            action: {}
        battery_1_night_charge_actions:
          name: "Actions de charge nocturne"
          description: "Actions personnalisées optionnelles exécutées quand les heures creuses deviennent actives, ainsi qu'au démarrage de Home Assistant ou au rechargement des automatisations si une période heures creuses est déjà active. Utilise-les pour placer cette batterie dans son mode de charge nocturne ; tant que les heures creuses restent actives, les écritures normales de consigne et les actions charge/décharge sont ignorées après leur exécution. Les variables battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w, export_surplus_w et off_peak_active sont disponibles dans ces actions."
          default: []
          selector:
            action: {}
    
