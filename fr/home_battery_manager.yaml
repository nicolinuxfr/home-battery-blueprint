              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_3 | float(0) }}"
              target_discharge_w: "{{ discharge_target_3 | float(0) }}"
              target_charge_w: "{{ charge_target_3 | float(0) }}"
          - alias: "Batterie 3: exécuter la séquence d'actions de charge"
            choose: []
            default: !input battery_3_charge_actions
  
  - alias: "Batterie 4: mettre à jour la consigne signée"
    choose:
      - alias: "Batterie 4: mise à jour de consigne nécessaire"
        conditions:
          - condition: template
            value_template: "{{ should_write_target_power_4 }}"
          - condition: template
            value_template: "{{ house_power_valid }}"
        sequence:
          - alias: "Batterie 4: préparer le contexte de mise à jour"
            variables:
              battery_slot: 4
              battery_soc: "{{ slot_4_soc }}"
              house_power_w: "{{ house_power_w }}"
              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_4 | float(0) }}"
              target_discharge_w: "{{ discharge_target_4 | float(0) }}"
              target_charge_w: "{{ charge_target_4 | float(0) }}"
              target_power_value: >-
                {% set signed = signed_target_4 | float(0) %}
                {% if battery_4_target_power_uses_absolute_value | bool %}
                  {{ signed | abs | round(0) | int(0) }}
                {% else %}
                  {{ signed | round(0) | int(0) }}
                {% endif %}
          - alias: "Batterie 4: sélectionner le service de consigne"
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ battery_4_target_power_entity.startswith('number.') }}"
                sequence:
                  - alias: "Batterie 4: écrire la consigne dans l'entité number"
                    action: number.set_value
                    continue_on_error: true
                    target:
                      entity_id: "{{ battery_4_target_power_entity }}"
                    data:
                      value: >-
                        {% set entity_min = state_attr(battery_4_target_power_entity, 'min') %}
                        {% if target_power_value | int(0) > 0
                              and entity_min is number
                              and entity_min | float(0) > 0
                              and target_power_value | int(0) < entity_min | float(0) %}
                          {% if house_power_w | float(0) < 0 %}
                            0
                          {% else %}
                            {{ entity_min | float(0) | round(0) | int(0) }}
                          {% endif %}
                        {% else %}
                          {{ target_power_value | int(0) }}
                        {% endif %}
              - conditions:
                  - condition: template
                    value_template: "{{ battery_4_target_power_entity.startswith('input_number.') }}"
                sequence:
                  - alias: "Batterie 4: écrire la consigne dans l'entité input_number"
                    action: input_number.set_value
                    continue_on_error: true
                    target:
                      entity_id: "{{ battery_4_target_power_entity }}"
                    data:
                      value: >-
                        {% set entity_min = state_attr(battery_4_target_power_entity, 'min') %}
                        {% if target_power_value | int(0) > 0
                              and entity_min is number
                              and entity_min | float(0) > 0
                              and target_power_value | int(0) < entity_min | float(0) %}
                          {% if house_power_w | float(0) < 0 %}
                            0
                          {% else %}
                            {{ entity_min | float(0) | round(0) | int(0) }}
                          {% endif %}
                        {% else %}
                          {{ target_power_value | int(0) }}
                        {% endif %}
