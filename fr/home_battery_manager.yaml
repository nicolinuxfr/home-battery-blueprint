         or current_target_sign_for_control_3 | int(0) != 0 }}
    {% elif not (target_value_changed_3 | bool) %}
      false
    {% elif same_direction_small_adjustment_3 | bool %}
      false
    {% else %}
      {{ discharge_cooldown_ok_3
         or (discharge_export_guard_active
             and slot_3_current_target_w | float(0) > 0
             and signed_target_3 | float(0) < slot_3_current_target_w | float(0)) }}
    {% endif %}
  should_run_charge_actions_3: >-
    {% if not slot_3_has_charge_actions %}
      false
    {% elif operating_mode == 'off_peak_charge' %}
      false
    {% elif direction_change_blocked_by_cooldown_3 | bool %}
      false
    {% elif signed_target_3 | float(0) >= 0 %}
      {{ (
           current_target_sign_for_control_3 | int(0) == -1
           and target_value_changed_3 | bool
         ) or (
