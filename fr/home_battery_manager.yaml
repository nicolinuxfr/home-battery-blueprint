      + (slot_4_actual_discharge_w | float(0) if slot_4_used | bool and slot_4_actual_power_usable | bool and slot_4_current_target_w | float(0) <= control_deadband_w | float(0) and slot_4_actual_discharge_w | float(0) > control_deadband_w | float(0) else 0)
