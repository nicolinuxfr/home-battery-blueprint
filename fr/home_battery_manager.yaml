        {% set allocation = [allocation, 0] | max %}
        {% set effective_allocation = [battery.current_discharge, allocation] | min %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
        {% set ns.remaining = [ns.remaining - effective_allocation, 0] | max %}
      {% endfor %}
      {% if operating_mode == 'discharge' %}
        {% for battery in discharge_residual_order %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if ns.remaining > 0
                and not battery.discharge_locked
                and (not battery.charge_locked or battery.responsive) %}
            {% set headroom = [battery.max_discharge - current_allocation, 0] | max %}
            {% set increase_allowed = raw_export_w | float(0) <= 0
                  or not (responsive_charge_absorber_available | bool)
                  or battery.responsive | bool %}
            {% set allocation = [headroom, ns.remaining] | min if increase_allowed else 0 %}
            {% set ramp_step = responsive_discharge_increase_step_w | float(0) if battery.responsive else discharge_increase_step_w | float(0) %}
            {% if house_power_w | float(0) >= strong_import_threshold_w | float(0) %}
              {% set ramp_step = [ramp_step, strong_import_discharge_increase_step_w | float(0)] | max %}
            {% endif %}
            {% set allocation = [allocation, ramp_step, ns.discharge_increase_budget_remaining | float(0)] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation + allocation) | round(0) %}
            {% endif %}
            {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
            {% set ns.discharge_increase_budget_remaining = [ns.discharge_increase_budget_remaining | float(0) - allocation, 0] | max %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% set ns.trim_remaining = discharge_export_guard_w | float(0) %}
      {% for battery in discharge_trim_order %}
        {% if ns.trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allowed = battery.responsive | bool
                or not (responsive_charge_absorber_available | bool)
                or ns.chargeable_raw_export_w | float(0) < opportunistic_charge_threshold_w | float(0)
                or current_total_charge_w | float(0) >= control_deadband_w | float(0) %}
          {% if current_allocation > 0
                and battery.actual_power_fresh
                and battery.target_age_s | float(0) < battery.response_grace_s | float(0)
                and battery.actual_discharge | float(0) > current_allocation + control_deadband_w | float(0) %}
            {% set pending_actual_drop = [battery.actual_discharge | float(0) - current_allocation, ns.trim_remaining] | min %}
            {% set ns.trim_remaining = [ns.trim_remaining - pending_actual_drop, 0] | max %}
            {% if not trim_is_charge_absorbable %}
              {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - pending_actual_drop, 0] | max %}
            {% endif %}
          {% endif %}
          {% set trim_allocation = [current_allocation, ns.trim_remaining] | min if trim_allowed else 0 %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.trim_remaining = [ns.trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.responsive_trim_remaining = responsive_discharge_export_trim_w | float(0) %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.responsive_trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.responsive_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.responsive_trim_remaining = [ns.responsive_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set responsive_trim_applied = (responsive_discharge_export_trim_w | float(0)) - (ns.responsive_trim_remaining | float(0)) %}
      {% set ns.cooldown_ready_trim_remaining = [(cooldown_ready_discharge_export_trim_w | float(0)) - responsive_trim_applied, 0] | max %}
      {% for battery in discharge_trim_order %}
        {% if ns.cooldown_ready_trim_remaining > 0 and not battery.discharge_locked %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.cooldown_ready_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if trim_allocation > 0 and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.cooldown_ready_trim_remaining = [ns.cooldown_ready_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.export_latency_brake_remaining = [raw_export_w | float(0) - control_deadband_w | float(0), 0] | max %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.export_latency_brake_remaining > 0
              and battery.can_charge
              and battery.actual_power_fresh %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if current_allocation > 0
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
            {% set brake_allocation = [current_allocation, ns.export_latency_brake_remaining] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation - brake_allocation) | round(0) %}
            {% endif %}
            {% set ns.export_latency_brake_w = ns.export_latency_brake_w + brake_allocation %}
            {% set ns.export_latency_brake_remaining = [ns.export_latency_brake_remaining - brake_allocation, 0] | max %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {
      'targets': {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4},
      'trimmed_locked_w': ns.trimmed_locked_w | round(0),
      'unresolved_raw_export_w': ns.trim_remaining | round(0),
      'chargeable_raw_export_w': ns.chargeable_raw_export_w | round(0),
      'export_latency_brake_w': ns.export_latency_brake_w | round(0)
    } }}
