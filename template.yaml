        'discharge_delivery_stalled': slot_1_discharge_delivery_stalled | bool,
        'discharge_available': (slot_1_can_discharge | bool) and not (slot_1_discharge_delivery_stalled | bool),
        'discharge_locked': (not (discharge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) > 0 and not (slot_1_discharge_delivery_stalled | bool),
        'charge_locked': (not (charge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) < 0,
        'start_from_zero_flow_confirmed': start_from_zero_flow_confirmed_1 | bool,
        'should_write_target': should_write_target_power_1 | bool,
        'should_run_discharge_actions': should_run_discharge_actions_1 | bool,
        'should_run_charge_actions': should_run_charge_actions_1 | bool
      },
      '2': {
        'used': slot_2_used | bool,
        'soc': slot_2_soc | float(0),
        'headroom_priority': slot_2_soc | float(0) >= high_soc_headroom_threshold_pct | float(0),
        'cooldown_s': battery_2_cooldown_seconds | float(0),
        'current_target_w': slot_2_current_target_w | float(0),
        'signed_target_w': signed_target_2 | float(0),
