actions:
  - alias: "[[trace.run_log_gate]]"
    event: home_battery_blueprint_run
    event_data:
      reason: "{{ run_log_reason }}"
      trigger_entity_id: "{{ trigger_entity_id }}"
      triggered_by_house_power_sensor: "{{ triggered_by_house_power_sensor }}"
      triggered_by_blocking_entity: "{{ triggered_by_blocking_entity }}"
      blocking_trigger_entered_blocked: "{{ blocking_trigger_entered_blocked }}"
      operating_mode: "{{ operating_mode }}"
      gate_blocked: "{{ gate_blocked }}"
      house_power_valid: "{{ house_power_valid }}"
      house_power_w: "{{ house_power_w | float(0) | round(1) }}"
      adjusted_house_power_w: "{{ adjusted_house_power_w | float(0) | round(1) }}"
      import_need_w: "{{ import_need_w | float(0) | round(1) }}"
      export_surplus_w: "{{ export_surplus_w | float(0) | round(1) }}"
      current_total_discharge_w: "{{ current_total_discharge_w | float(0) | round(1) }}"
      current_total_charge_w: "{{ current_total_charge_w | float(0) | round(1) }}"
      discharge_export_guard_w: "{{ discharge_export_guard_w | float(0) | round(1) }}"
      discharge_trimmed_locked_w: "{{ discharge_trimmed_locked_w | float(0) | round(1) }}"
      unresolved_raw_export_w: "{{ unresolved_raw_export_w | float(0) | round(1) }}"
      emergency_charge_surplus_w: "{{ emergency_charge_surplus_w | float(0) | round(1) }}"
      validation_errors: "{{ validation_errors | tojson }}"
      discharge_targets: "{{ discharge_targets | tojson }}"
      charge_targets: "{{ charge_targets | tojson }}"
      neutral_targets: "{{ neutral_targets | tojson }}"
      slots: "{{ run_log_slots_json }}"

  - alias: "[[trace.validation_gate]]"
    choose:
      - alias: "[[trace.small_delta_branch]]"
        conditions:
          - condition: template
            value_template: "{{ should_stop_small_house_power_delta }}"
        sequence:
          - alias: "[[trace.stop_small_delta]]"
            stop: >-
              [[message.small_delta_skipped]]
              {{ house_power_trigger_delta_w | float(0) | round(1) }} W < {{ minimum_trigger_delta_w | float(0) | round(1) }} W.

      - alias: "[[trace.invalid_config_branch]]"
        conditions:
          - condition: template
            value_template: "{{ validation_errors | count > 0 }}"
        sequence:
          - alias: "[[trace.stop_invalid_config]]"
            stop: >-
              [[message.invalid_config_prefix]]
              {{ validation_errors | join(' | ') }}

      - alias: "[[trace.invalid_sensor_branch]]"
        conditions:
          - condition: template
            value_template: "{{ operating_mode == 'invalid_sensor' }}"
        sequence:
          - alias: "[[trace.stop_invalid_sensor]]"
            stop: >-
              [[message.invalid_sensor]]
  # Generated slot actions keep the signed target entity updated and
  # optionally run active-mode custom actions for charge/discharge integrations.
  [[generated.slot_actions]]
