blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] - [Changelog](https://github.com/nicolinuxfr/home-battery-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  source_url: https://github.com/nicolinuxfr/home-battery-blueprint
  homeassistant:
    min_version: 2024.6.0
  input:
    house_power_sensor:
      name: "[[input.house_power_sensor.name]]"
      description: "[[input.house_power_sensor.description]]"
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    blocking_entities:
      name: "[[input.blocking_entities.name]]"
      description: "[[input.blocking_entities.description]]"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
            - domain: input_boolean

    # Each battery slot is driven through a signed numeric target entity.
    # Optional active-mode actions can translate that target to vendor-specific controls.
    # Generated SoC selectors are limited to battery percentage sensors.
    [[generated.slot_inputs]]

mode: restart

triggers:
  - trigger: state
    entity_id: !input house_power_sensor
  - trigger: state
    entity_id: !input blocking_entities

variables:
  house_power_sensor: !input house_power_sensor
  blocking_entities: !input blocking_entities
  command_deadband_w: 50

  [[generated.slot_bindings]]

  gate_blocked: >-
    {% set blockers = expand(blocking_entities) %}
    {{ blockers | selectattr('state', 'ne', 'off') | list | count > 0 }}
  trigger_entity_id: >-
    {% if trigger is defined and trigger.platform == 'state' and trigger.entity_id is defined %}
      {{ trigger.entity_id }}
    {% else %}
      
    {% endif %}
  triggered_by_blocking_entity: "{{ trigger_entity_id in blocking_entities }}"
  blocking_trigger_entered_blocked: >-
    {% if triggered_by_blocking_entity and trigger is defined and trigger.to_state is not none %}
      {{ trigger.to_state.state != 'off' }}
    {% else %}
      false
    {% endif %}
  house_power_state: "{{ states(house_power_sensor) }}"
  house_power_valid: "{{ house_power_state not in ['unknown', 'unavailable', 'none', ''] }}"
  house_power_w: "{{ house_power_state | float(0) }}"

  [[generated.slot_state_vars]]

  # Rebuild the underlying house demand from the net house meter plus the
  # effective managed battery contribution. Signed targets stay primary, while
  # optional actual-power sensors can only trim that contribution later as a
  # secondary correction if a non-priority battery keeps under-delivering after
  # its grace period. Priority discharge batteries are never trimmed down by
  # this correction, but fresh telemetry can still raise their effective
  # contribution when they are already delivering more than their signed target.
  # If a priority battery keeps commanding discharge but fresh telemetry shows
  # it is no longer delivering materially above zero after its grace period, it
  # stops being treated as priority until it actually contributes again.
  managed_battery_power_w: >-
    {{
      (slot_1_effective_balance_power | float(0))
      + (slot_2_effective_balance_power | float(0))
      + (slot_3_effective_balance_power | float(0))
      + (slot_4_effective_balance_power | float(0))
    }}
  adjusted_house_power_w: >-
    {% if house_power_valid %}
      {{ (house_power_w | float(0)) + (managed_battery_power_w | float(0)) }}
    {% else %}
      0
    {% endif %}
  import_need_w: "{{ [adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  export_surplus_w: "{{ [0 - adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"

  # Generated validation catches missing target entities and zero power limits
  # before any target update or custom action is executed.
  validation_errors: >-
    {% set ns = namespace(errors=[]) %}
    [[generated.slot_validation_lines]]
    {{ ns.errors }}

  # Cooldown state must be available before building the battery list so
  # allocation can reserve locked output and redistribute only the remainder.
  [[generated.cooldown_vars]]

  batteries: >-
    {% set ns = namespace(items=[]) %}
    [[generated.batteries_json_lines]]
    {{ ns.items }}
  [[generated.count_vars]]

  operating_mode: >-
    {% if gate_blocked %}
      blocked
    {% elif validation_errors | count > 0 %}
      invalid_config
    {% elif not house_power_valid %}
      invalid_sensor
    {% elif import_need_w >= command_deadband_w and discharge_capable_count > 0 %}
      discharge
    {% elif export_surplus_w >= command_deadband_w and near_full_exists and charge_capable_count > 0 %}
      charge
    {% else %}
      neutral
    {% endif %}

  discharge_order: >-
    {% set ns = namespace(priority=[], regular=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge %}
        {% if battery.priority %}
          {% set ns.priority = ns.priority + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.priority | sort(attribute='soc', reverse=true)) + (ns.regular | sort(attribute='soc', reverse=true)) }}
  charge_order: >-
    {% set ns = namespace(non_priority=[], priority=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% if battery.priority %}
          {% set ns.priority = ns.priority + [battery] %}
        {% else %}
          {% set ns.non_priority = ns.non_priority + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.non_priority | sort(attribute='soc')) + (ns.priority | sort(attribute='soc')) }}

  discharge_targets: >-
    {% set batteries = discharge_order %}
    {% set ns = namespace(remaining=import_need_w | float(0), t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'discharge' %}
      {% for battery in batteries %}
        {% if battery.discharge_locked %}
          {% set allocation = [battery.current_discharge, battery.max_discharge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% if not battery.discharge_locked %}
          {% set allocation = [battery.max_discharge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  charge_targets: >-
    {% set batteries = charge_order %}
    {% set ns = namespace(remaining=export_surplus_w | float(0), t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'charge' %}
      {% for battery in batteries %}
        {% if battery.charge_locked %}
          {% set allocation = [battery.current_charge, battery.max_charge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% if not battery.charge_locked %}
          {% set allocation = [battery.max_charge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  neutral_targets: >-
    {% set ns = namespace(t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'neutral' %}
      {% for battery in batteries %}
        {% set hold_power = battery.current_discharge | float(0) - battery.current_charge | float(0) %}
        {% set hold_power = [hold_power, battery.max_discharge | float(0)] | min %}
        {% set hold_power = [hold_power, 0 - (battery.max_charge | float(0))] | max %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = hold_power | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = hold_power | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = hold_power | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = hold_power | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}

  discharge_target_1: "{{ discharge_targets['1'] | float(0) }}"
  discharge_target_2: "{{ discharge_targets['2'] | float(0) }}"
  discharge_target_3: "{{ discharge_targets['3'] | float(0) }}"
  discharge_target_4: "{{ discharge_targets['4'] | float(0) }}"

  charge_target_1: "{{ charge_targets['1'] | float(0) }}"
  charge_target_2: "{{ charge_targets['2'] | float(0) }}"
  charge_target_3: "{{ charge_targets['3'] | float(0) }}"
  charge_target_4: "{{ charge_targets['4'] | float(0) }}"
  neutral_target_1: "{{ neutral_targets['1'] | float(0) }}"
  neutral_target_2: "{{ neutral_targets['2'] | float(0) }}"
  neutral_target_3: "{{ neutral_targets['3'] | float(0) }}"
  neutral_target_4: "{{ neutral_targets['4'] | float(0) }}"

  [[generated.command_vars]]

actions:
  - alias: "[[trace.validation_gate]]"
    choose:
      - alias: "[[trace.invalid_config_branch]]"
        conditions:
          - condition: template
            value_template: "{{ validation_errors | count > 0 }}"
        sequence:
          - alias: "[[trace.stop_invalid_config]]"
            stop: >-
              [[message.invalid_config_prefix]]
              {{ validation_errors | join(' | ') }}

      - alias: "[[trace.invalid_sensor_branch]]"
        conditions:
          - condition: template
            value_template: "{{ operating_mode == 'invalid_sensor' }}"
        sequence:
          - alias: "[[trace.stop_invalid_sensor]]"
            stop: >-
              [[message.invalid_sensor]]

  # Generated slot actions keep the signed target entity updated and
  # optionally run active-mode custom actions for charge/discharge integrations.
  [[generated.slot_actions]]
