blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] - [Changelog](https://github.com/nicolinuxfr/home-battery-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  source_url: https://github.com/nicolinuxfr/home-battery-blueprint
  homeassistant:
    min_version: 2024.6.0
  input:
    house_power_sensor:
      name: "[[input.house_power_sensor.name]]"
      description: "[[input.house_power_sensor.description]]"
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    blocking_entities:
      name: "[[input.blocking_entities.name]]"
      description: "[[input.blocking_entities.description]]"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
            - domain: input_boolean

    # Each battery slot is driven through a signed numeric target entity.
    # Optional active-mode actions can translate that target to vendor-specific controls.
    # Generated SoC selectors are limited to battery percentage sensors.
    [[generated.slot_inputs]]

mode: restart

triggers:
  - trigger: state
    entity_id: !input house_power_sensor
    not_to: null
  - trigger: state
    entity_id: !input blocking_entities

variables:
  house_power_sensor: !input house_power_sensor
  blocking_entities: !input blocking_entities
  command_deadband_w: 60
  release_deadband_w: 80
  minimum_trigger_delta_w: 10
  near_full_priority_on_soc_pct: 90
  near_full_priority_off_soc_pct: 80

  [[generated.slot_bindings]]

  gate_blocked: >-
    {% set blockers = expand(blocking_entities) %}
    {{ blockers | selectattr('state', 'ne', 'off') | list | count > 0 }}
  trigger_entity_id: >-
    {% if trigger is defined and trigger.platform == 'state' and trigger.entity_id is defined %}
      {{ trigger.entity_id }}
    {% else %}
      
    {% endif %}
  triggered_by_blocking_entity: "{{ trigger_entity_id in blocking_entities }}"
  triggered_by_house_power_sensor: "{{ trigger_entity_id == house_power_sensor }}"
  blocking_trigger_entered_blocked: >-
    {% if triggered_by_blocking_entity and trigger is defined and trigger.to_state is not none %}
      {{ trigger.to_state.state != 'off' }}
    {% else %}
      false
    {% endif %}
  trigger_from_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.from_state is not none %}
      {% set value = trigger.from_state.state %}
      {% if value not in ['unknown', 'unavailable', 'none', ''] %}
        {{ value | float(0) }}
      {% else %}
        none
      {% endif %}
    {% else %}
      none
    {% endif %}
  trigger_to_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.to_state is not none %}
      {% set value = trigger.to_state.state %}
      {% if value not in ['unknown', 'unavailable', 'none', ''] %}
        {{ value | float(0) }}
      {% else %}
        none
      {% endif %}
    {% else %}
      none
    {% endif %}
  house_power_trigger_delta_w: >-
    {% if trigger_from_house_power_w is not none and trigger_to_house_power_w is not none %}
      {{ ((trigger_to_house_power_w | float(0)) - (trigger_from_house_power_w | float(0))) | abs }}
    {% else %}
      none
    {% endif %}
  should_skip_small_house_power_delta: >-
    {% if not triggered_by_house_power_sensor %}
      false
    {% elif minimum_trigger_delta_w | float(0) <= 0 %}
      false
    {% elif house_power_trigger_delta_w is none %}
      false
    {% else %}
      {{ house_power_trigger_delta_w | float(0) < minimum_trigger_delta_w | float(0) }}
    {% endif %}
  house_power_state: "{{ states(house_power_sensor) }}"
  house_power_valid: "{{ house_power_state not in ['unknown', 'unavailable', 'none', ''] }}"
  house_power_w: "{{ house_power_state | float(0) }}"

  [[generated.slot_state_vars]]

  # Rebuild the underlying house demand from the net house meter plus the
  # measured managed battery contribution when fresh telemetry is available.
  # Allocation then keeps a separate temporary reservation of newly requested
  # target power during each battery response grace period so a slow priority
  # battery keeps ownership of the power it has just been asked to provide,
  # while faster lower-priority batteries can temporarily cover the observed
  # ramp gap when their cooldown is shorter. A raw house export beyond the
  # release deadband now also trims discharge targets back down, so stale
  # reserved power cannot keep forcing large exports for a whole cooldown.
  managed_battery_power_w: >-
    {{
      (slot_1_effective_balance_power | float(0))
      + (slot_2_effective_balance_power | float(0))
      + (slot_3_effective_balance_power | float(0))
      + (slot_4_effective_balance_power | float(0))
    }}
  raw_export_w: "{{ [0 - house_power_w, 0] | max if house_power_valid else 0 }}"
  discharge_export_guard_w: >-
    {% if not house_power_valid %}
      0
    {% elif raw_export_w | float(0) <= release_deadband_w | float(0) %}
      0
    {% else %}
      {{ (raw_export_w | float(0)) - (release_deadband_w | float(0)) }}
    {% endif %}
  discharge_export_guard_active: "{{ discharge_export_guard_w | float(0) > 0 }}"
  adjusted_house_power_w: >-
    {% if house_power_valid %}
      {{ (house_power_w | float(0)) + (managed_battery_power_w | float(0)) }}
    {% else %}
      0
    {% endif %}
  import_need_w: "{{ [adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  export_surplus_w: "{{ [0 - adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"

  # Generated validation catches missing target entities and zero power limits
  # before any target update or custom action is executed.
  validation_errors: >-
    {% set ns = namespace(errors=[]) %}
    [[generated.slot_validation_lines]]
    {{ ns.errors }}

  # Cooldown state must be available before building the battery list so
  # allocation can reserve locked output and redistribute only the remainder.
  [[generated.cooldown_vars]]

  batteries: >-
    {% set ns = namespace(items=[]) %}
    [[generated.batteries_json_lines]]
    {{ ns.items }}
  [[generated.count_vars]]
  current_total_discharge_w: >-
    {{
      (slot_1_current_target_w | float(0) if slot_1_current_target_w | float(0) > 0 else 0)
      + (slot_2_current_target_w | float(0) if slot_2_current_target_w | float(0) > 0 else 0)
      + (slot_3_current_target_w | float(0) if slot_3_current_target_w | float(0) > 0 else 0)
      + (slot_4_current_target_w | float(0) if slot_4_current_target_w | float(0) > 0 else 0)
    }}
  current_total_charge_w: >-
    {{
      (0 - (slot_1_current_target_w | float(0)) if slot_1_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_2_current_target_w | float(0)) if slot_2_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_3_current_target_w | float(0)) if slot_3_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_4_current_target_w | float(0)) if slot_4_current_target_w | float(0) < 0 else 0)
    }}
  hold_discharge_mode: >-
    {{ current_total_discharge_w >= command_deadband_w
       and import_need_w < command_deadband_w
       and export_surplus_w < release_deadband_w }}
  hold_charge_mode: >-
    {{ current_total_charge_w >= command_deadband_w
       and export_surplus_w < command_deadband_w
       and import_need_w < release_deadband_w }}

  operating_mode: >-
    {% if gate_blocked %}
      blocked
    {% elif validation_errors | count > 0 %}
      invalid_config
    {% elif not house_power_valid %}
      invalid_sensor
    {% elif import_need_w >= command_deadband_w and discharge_capable_count > 0 %}
      discharge
    {% elif hold_discharge_mode %}
      discharge_hold
    {% elif export_surplus_w >= command_deadband_w and charge_capable_count > 0 %}
      charge
    {% elif hold_charge_mode %}
      charge_hold
    {% else %}
      neutral
    {% endif %}

  discharge_order: >-
    {% set ns = namespace(headroom=[], priority=[], regular=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge %}
        {% if battery.priority_rank | int(0) >= 2 %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% elif battery.priority %}
          {% set ns.priority = ns.priority + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.headroom | sort(attribute='soc', reverse=true))
       + (ns.priority | sort(attribute='soc', reverse=true))
       + (ns.regular | sort(attribute='soc', reverse=true)) }}
  discharge_assist_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge and not battery.priority %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s') }}
  discharge_trim_order: >-
    {% set ns = namespace(non_priority=[], priority=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge %}
        {% if battery.priority_rank | int(0) >= 2 %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% elif battery.priority %}
          {% set ns.priority = ns.priority + [battery] %}
        {% else %}
          {% set ns.non_priority = ns.non_priority + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ((ns.non_priority | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s'))
       + ((ns.priority | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s'))
       + ((ns.headroom | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s')) }}
  charge_order: >-
    {% set ns = namespace(non_priority=[], priority=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% if battery.priority_rank | int(0) >= 2 %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% elif battery.priority %}
          {% set ns.priority = ns.priority + [battery] %}
        {% else %}
          {% set ns.non_priority = ns.non_priority + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.non_priority | sort(attribute='soc'))
       + (ns.priority | sort(attribute='soc'))
       + (ns.headroom | sort(attribute='soc')) }}

  discharge_plan: >-
    {% set batteries = discharge_order %}
    {% set ns = namespace(
      remaining=import_need_w | float(0),
      assist_remaining=0,
      trim_remaining=discharge_export_guard_w | float(0),
      assist_source_cooldown=-1,
      assist_used=0,
      assist_priority_slots=[],
      assist_helper_slots=[],
      t1=0,
      t2=0,
      t3=0,
      t4=0
    ) %}
    {% if operating_mode == 'discharge' %}
      {% for battery in batteries %}
        {% if battery.discharge_locked %}
          {% set allocation = [battery.current_discharge, battery.max_discharge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% if not battery.discharge_locked %}
          {% set allocation = [battery.max_discharge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% if battery.priority and battery.actual_power_fresh %}
          {% set desired_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set desired_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set desired_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set desired_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set desired_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set ramping_now = desired_allocation > (battery.current_discharge | float(0)) %}
          {% set still_ramping = battery.discharge_locked and battery.target_age_s < battery.response_grace_s %}
          {% if desired_allocation > battery.actual_discharge and (ramping_now or still_ramping) %}
            {% set assist_gap = [desired_allocation - battery.actual_discharge, 0] | max %}
            {% set ns.assist_remaining = ns.assist_remaining + assist_gap %}
            {% set ns.assist_source_cooldown = [ns.assist_source_cooldown, battery.cooldown_s | float(0)] | max %}
            {% set ns.assist_priority_slots = ns.assist_priority_slots + [battery.slot] %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {% set ns.assist_remaining = [ns.assist_remaining, import_need_w | float(0)] | min %}
      {% for battery in discharge_assist_order %}
        {% if ns.assist_remaining > 0 and not battery.discharge_locked and battery.cooldown_s < ns.assist_source_cooldown %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set headroom = [battery.max_discharge - current_allocation, 0] | max %}
          {% set assist_allocation = [headroom, ns.assist_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation + assist_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation + assist_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation + assist_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation + assist_allocation) | round(0) %}
          {% endif %}
          {% set ns.assist_remaining = [ns.assist_remaining - assist_allocation, 0] | max %}
          {% if assist_allocation > 0 %}
            {% set ns.assist_used = ns.assist_used + assist_allocation %}
            {% set ns.assist_helper_slots = ns.assist_helper_slots + [battery.slot] %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {% for battery in discharge_trim_order %}
        {% if ns.trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_allocation = [current_allocation, ns.trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% set ns.trim_remaining = [ns.trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% elif operating_mode == 'discharge_hold' %}
      {% for battery in batteries %}
        {% set allocation = battery.current_discharge | float(0) %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {
      'targets': {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4},
      'assist_w': ns.assist_used | round(0),
      'assist_priority_slots': ns.assist_priority_slots,
      'assist_helper_slots': ns.assist_helper_slots
    } }}
  discharge_targets: "{{ discharge_plan['targets'] }}"
  charge_targets: >-
    {% set batteries = charge_order %}
    {% set ns = namespace(remaining=export_surplus_w | float(0), t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'charge' %}
      {% for battery in batteries %}
        {% if battery.charge_locked %}
          {% set allocation = [battery.current_charge, battery.max_charge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% if not battery.charge_locked %}
          {% set allocation = [battery.max_charge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% elif operating_mode == 'charge_hold' %}
      {% for battery in batteries %}
        {% set allocation = battery.current_charge | float(0) %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  neutral_targets: >-
    {% set ns = namespace(t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'neutral' %}
      {% for battery in batteries %}
        {% set hold_power = battery.current_discharge | float(0) - battery.current_charge | float(0) %}
        {% set hold_power = [hold_power, battery.max_discharge | float(0)] | min %}
        {% set hold_power = [hold_power, 0 - (battery.max_charge | float(0))] | max %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = hold_power | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = hold_power | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = hold_power | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = hold_power | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  discharge_assist_w: "{{ discharge_plan['assist_w'] | float(0) }}"
  discharge_assist_priority_slots: "{{ discharge_plan['assist_priority_slots'] }}"
  discharge_assist_helper_slots: "{{ discharge_plan['assist_helper_slots'] }}"
  assist_overshoot_detected: >-
    {{ operating_mode == 'discharge'
       and discharge_assist_w | float(0) > 0
       and house_power_valid
       and house_power_w | float(0) <= 0 - (command_deadband_w | float(0)) }}

  discharge_target_1: "{{ discharge_targets['1'] | float(0) }}"
  discharge_target_2: "{{ discharge_targets['2'] | float(0) }}"
  discharge_target_3: "{{ discharge_targets['3'] | float(0) }}"
  discharge_target_4: "{{ discharge_targets['4'] | float(0) }}"

  charge_target_1: "{{ charge_targets['1'] | float(0) }}"
  charge_target_2: "{{ charge_targets['2'] | float(0) }}"
  charge_target_3: "{{ charge_targets['3'] | float(0) }}"
  charge_target_4: "{{ charge_targets['4'] | float(0) }}"
  neutral_target_1: "{{ neutral_targets['1'] | float(0) }}"
  neutral_target_2: "{{ neutral_targets['2'] | float(0) }}"
  neutral_target_3: "{{ neutral_targets['3'] | float(0) }}"
  neutral_target_4: "{{ neutral_targets['4'] | float(0) }}"

  [[generated.command_vars]]
  run_log_reason: >-
    {% if should_skip_small_house_power_delta %}
      small_delta_skipped
    {% elif validation_errors | count > 0 %}
      invalid_config
    {% elif operating_mode == 'invalid_sensor' %}
      invalid_sensor
    {% else %}
      {{ operating_mode }}
    {% endif %}
  run_log_slots_json: >-
    {{ {
      '1': {
        'used': slot_1_used | bool,
        'soc': slot_1_soc | float(0),
        'priority': battery_1_priority_discharge | bool,
        'high_soc_priority': slot_1_high_soc_priority_active | bool,
        'priority_rank': slot_1_priority_rank | int(0),
        'effective_priority': ((battery_1_priority_discharge | bool) or (slot_1_high_soc_priority_active | bool)) and not (slot_1_discharge_delivery_stalled | bool),
        'current_target_w': slot_1_current_target_w | float(0),
        'signed_target_w': signed_target_1 | float(0),
        'discharge_target_w': discharge_target_1 | float(0),
        'charge_target_w': charge_target_1 | float(0),
        'neutral_target_w': neutral_target_1 | float(0),
        'actual_discharge_w': slot_1_actual_discharge_w | float(0),
        'actual_charge_w': slot_1_actual_charge_w | float(0),
        'actual_power_fresh': slot_1_actual_power_fresh | bool,
        'target_age_s': slot_1_target_age_s | float(0),
        'response_grace_s': slot_1_response_grace_s | float(0),
        'discharge_locked': (not (discharge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) > 0,
        'charge_locked': (not (charge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) < 0,
        'should_write_target': should_write_target_power_1 | bool,
        'should_run_discharge_actions': should_run_discharge_actions_1 | bool,
        'should_run_charge_actions': should_run_charge_actions_1 | bool
      },
      '2': {
        'used': slot_2_used | bool,
        'soc': slot_2_soc | float(0),
        'priority': battery_2_priority_discharge | bool,
        'high_soc_priority': slot_2_high_soc_priority_active | bool,
        'priority_rank': slot_2_priority_rank | int(0),
        'effective_priority': ((battery_2_priority_discharge | bool) or (slot_2_high_soc_priority_active | bool)) and not (slot_2_discharge_delivery_stalled | bool),
        'current_target_w': slot_2_current_target_w | float(0),
