blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] - [Changelog](https://github.com/nicolinuxfr/home-battery-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  source_url: https://github.com/nicolinuxfr/home-battery-blueprint
  homeassistant:
    min_version: 2024.6.0
  input:
    house_power_sensor:
      name: "[[input.house_power_sensor.name]]"
      description: "[[input.house_power_sensor.description]]"
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    off_peak_entities:
      name: "[[input.off_peak_entities.name]]"
      description: "[[input.off_peak_entities.description]]"
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
            - domain: input_boolean
            - domain: schedule
    off_peak_import_limit_w:
      name: "[[input.off_peak_import_limit_w.name]]"
      description: "[[input.off_peak_import_limit_w.description]]"
      default: 0
      selector:
        number:
          min: 0
          max: 20000
          step: 50
          unit_of_measurement: W
          mode: box
    solar_forecast_tomorrow_sensor:
      name: "[[input.solar_forecast_tomorrow_sensor.name]]"
      description: "[[input.solar_forecast_tomorrow_sensor.description]]"
      default: ""
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: energy
    solar_reserve_share_pct:
      name: "[[input.solar_reserve_share_pct.name]]"
      description: "[[input.solar_reserve_share_pct.description]]"
      default: 50
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    # Each battery slot is driven through a signed numeric target entity.
    # Optional active-mode actions can translate that target to vendor-specific controls.
    # Generated SoC selectors are limited to battery percentage sensors.
    [[generated.slot_inputs]]

mode: restart

triggers:
  - trigger: state
    entity_id: !input house_power_sensor
    not_to: null
  - trigger: state
    entity_id: !input off_peak_entities
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "00:15:00"
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "00:30:00"
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "00:45:00"
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "01:00:00"

variables:
  house_power_sensor: !input house_power_sensor
  off_peak_entities: !input off_peak_entities
  off_peak_import_limit_w: !input off_peak_import_limit_w
  solar_forecast_tomorrow_sensor: !input solar_forecast_tomorrow_sensor
  solar_reserve_share_pct: !input solar_reserve_share_pct
  command_deadband_w: 60
  release_deadband_w: 80
  minimum_trigger_delta_w: 10
  minimum_target_delta_w: 10
  high_soc_headroom_threshold_pct: 90
  responsive_trim_max_cooldown_s: 10
  allow_confirmed_flow_start_from_zero: true
  actual_power_stale_timeout_s: 300
  run_started_ts: "{{ as_timestamp(now()) }}"

  [[generated.slot_bindings]]

  off_peak_active: >-
    {% set entities = expand(off_peak_entities) %}
    {{ entities | selectattr('state', 'eq', 'on') | list | count > 0 }}
  off_peak_started_ts: >-
    {% set ns = namespace(started=0) %}
    {% for entity in expand(off_peak_entities) %}
      {% if entity.state == 'on' %}
        {% set ts = as_timestamp(entity.last_changed, 0) %}
        {% if ns.started == 0 or ts < ns.started %}
          {% set ns.started = ts %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.started }}
  off_peak_elapsed_minutes: >-
    {% if off_peak_active | bool and off_peak_started_ts | float(0) > 0 %}
      {{ ((run_started_ts | float(0)) - (off_peak_started_ts | float(0))) / 60 }}
    {% else %}
      0
    {% endif %}
  trigger_entity_id: >-
    {% if trigger is defined and trigger.platform == 'state' and trigger.entity_id is defined %}
      {{ trigger.entity_id }}
    {% else %}
      
    {% endif %}
  triggered_by_off_peak_entity: "{{ trigger_entity_id in off_peak_entities }}"
  triggered_by_house_power_sensor: "{{ trigger_entity_id == house_power_sensor }}"
  off_peak_trigger_entered_active: >-
    {% if triggered_by_off_peak_entity and trigger is defined and trigger.to_state is not none %}
      {{ trigger.to_state.state == 'on' }}
    {% else %}
      false
    {% endif %}
  trigger_from_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.from_state is not none %}
      {% set value = trigger.from_state.state %}
      {% if is_number(value) %}
        {{ value | float(0) }}
      {% else %}
        none
      {% endif %}
    {% else %}
      none
    {% endif %}
  trigger_to_house_power_w: >-
    {% if triggered_by_house_power_sensor and trigger is defined and trigger.to_state is not none %}
      {% set value = trigger.to_state.state %}
      {% if is_number(value) %}
        {{ value | float(0) }}
      {% else %}
        none
      {% endif %}
    {% else %}
      none
    {% endif %}
  house_power_trigger_delta_w: >-
    {% if trigger_from_house_power_w is not none and trigger_to_house_power_w is not none %}
      {{ ((trigger_to_house_power_w | float(0)) - (trigger_from_house_power_w | float(0))) | abs }}
    {% else %}
      none
    {% endif %}
  should_skip_small_house_power_delta: >-
    {% if not triggered_by_house_power_sensor %}
      false
    {% elif minimum_trigger_delta_w | float(0) <= 0 %}
      false
    {% elif house_power_trigger_delta_w is none %}
      false
    {% else %}
      {{ house_power_trigger_delta_w | float(0) < minimum_trigger_delta_w | float(0) }}
    {% endif %}
  house_power_state: "{{ states(house_power_sensor) }}"
  house_power_valid: "{{ is_number(house_power_state) }}"
  house_power_w: "{{ house_power_state | float(0) if house_power_valid | bool else 0 }}"

  # Generated slot state treats actual-power telemetry as a guardrail: stale
  # telemetry does not block an idle battery from starting, but an active
  # battery that still reports stale or missing delivery after its response
  # window is kept out of extra discharge allocation.
  [[generated.slot_state_vars]]

  # Rebuild the underlying house demand from the net house meter plus the
  # managed battery contribution. Long-cooldown batteries keep stable active
  # targets; short-cooldown batteries take the residual and absorb reductions.
  managed_battery_power_w: >-
    {{
      (slot_1_effective_balance_power | float(0))
      + (slot_2_effective_balance_power | float(0))
      + (slot_3_effective_balance_power | float(0))
      + (slot_4_effective_balance_power | float(0))
    }}
  uncommanded_actual_discharge_w: >-
    {{
      (slot_1_actual_discharge_w | float(0) if slot_1_current_target_w | float(0) <= 0 and slot_1_actual_power_usable | bool else 0)
      + (slot_2_actual_discharge_w | float(0) if slot_2_current_target_w | float(0) <= 0 and slot_2_actual_power_usable | bool else 0)
      + (slot_3_actual_discharge_w | float(0) if slot_3_current_target_w | float(0) <= 0 and slot_3_actual_power_usable | bool else 0)
      + (slot_4_actual_discharge_w | float(0) if slot_4_current_target_w | float(0) <= 0 and slot_4_actual_power_usable | bool else 0)
    }}
  uncommanded_actual_charge_w: >-
    {{
      (slot_1_actual_charge_w | float(0) if slot_1_current_target_w | float(0) >= 0 and slot_1_actual_power_usable | bool else 0)
      + (slot_2_actual_charge_w | float(0) if slot_2_current_target_w | float(0) >= 0 and slot_2_actual_power_usable | bool else 0)
      + (slot_3_actual_charge_w | float(0) if slot_3_current_target_w | float(0) >= 0 and slot_3_actual_power_usable | bool else 0)
      + (slot_4_actual_charge_w | float(0) if slot_4_current_target_w | float(0) >= 0 and slot_4_actual_power_usable | bool else 0)
    }}
  raw_export_w: "{{ [0 - house_power_w, 0] | max if house_power_valid else 0 }}"
  discharge_export_guard_w: >-
    {% if not house_power_valid %}
      0
    {% elif raw_export_w | float(0) <= release_deadband_w | float(0) %}
      0
    {% else %}
      {{ (raw_export_w | float(0)) - (release_deadband_w | float(0)) }}
    {% endif %}
  discharge_export_guard_active: "{{ discharge_export_guard_w | float(0) > 0 }}"
  adjusted_house_power_w: >-
    {% if house_power_valid %}
      {{ (house_power_w | float(0)) + (managed_battery_power_w | float(0)) }}
    {% else %}
      0
    {% endif %}
  import_need_w: "{{ [adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  export_surplus_w: "{{ [0 - adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  solar_forecast_tomorrow_state: >-
    {% if solar_forecast_tomorrow_sensor != '' %}
      {{ states(solar_forecast_tomorrow_sensor) }}
    {% else %}
      none
    {% endif %}
  solar_forecast_tomorrow_valid: >-
    {{ solar_forecast_tomorrow_sensor != ''
       and is_number(solar_forecast_tomorrow_state)
       and solar_forecast_tomorrow_state | float(0) >= 0 }}
  solar_forecast_tomorrow_kwh: >-
    {% if solar_forecast_tomorrow_valid | bool %}
      {{ solar_forecast_tomorrow_state | float(0) }}
    {% else %}
      0
    {% endif %}

  # Generated validation catches missing target entities and zero power limits
  # before any target update or custom action is executed.
  validation_errors: >-
    {% set ns = namespace(errors=[]) %}
    [[generated.slot_validation_lines]]
    {{ ns.errors }}

  # Cooldown state must be available before building the battery list so
  # allocation can reserve locked output and redistribute only the remainder.
  [[generated.cooldown_vars]]

  batteries: >-
    {% set ns = namespace(items=[]) %}
    [[generated.batteries_json_lines]]
    {{ ns.items }}
  [[generated.count_vars]]
  off_peak_total_capacity_kwh: >-
    {{
      (battery_1_usable_capacity_kwh | float(0) if slot_1_can_off_peak_charge | bool else 0)
      + (battery_2_usable_capacity_kwh | float(0) if slot_2_can_off_peak_charge | bool else 0)
      + (battery_3_usable_capacity_kwh | float(0) if slot_3_can_off_peak_charge | bool else 0)
      + (battery_4_usable_capacity_kwh | float(0) if slot_4_can_off_peak_charge | bool else 0)
    }}
  off_peak_reserved_solar_kwh: >-
    {% if solar_forecast_tomorrow_valid | bool and off_peak_total_capacity_kwh | float(0) > 0 %}
      {% set requested = solar_forecast_tomorrow_kwh | float(0) * solar_reserve_share_pct | float(0) / 100 %}
      {{ [requested, off_peak_total_capacity_kwh | float(0)] | min }}
    {% else %}
      0
    {% endif %}
  off_peak_target_soc_pct: >-
    {% if solar_forecast_tomorrow_valid | bool and off_peak_total_capacity_kwh | float(0) > 0 %}
      {{ 100 - ((off_peak_reserved_solar_kwh | float(0)) / (off_peak_total_capacity_kwh | float(0)) * 100) }}
    {% else %}
      0
    {% endif %}
  off_peak_target_valid: >-
    {{ off_peak_active | bool
       and off_peak_import_limit_w | float(0) > 0
       and solar_forecast_tomorrow_valid | bool
       and off_peak_total_capacity_kwh | float(0) > 0
       and off_peak_charge_capable_count | int(0) > 0 }}
  off_peak_available_charge_w: >-
    {% if not (off_peak_target_valid | bool) or not house_power_valid %}
      0
    {% else %}
      {% set base_import_w = [adjusted_house_power_w | float(0), 0] | max %}
      {{ [off_peak_import_limit_w | float(0) - base_import_w, 0] | max }}
    {% endif %}
  off_peak_ready_to_charge: >-
    {{ off_peak_target_valid | bool
       and off_peak_available_charge_w | float(0) >= command_deadband_w | float(0)
       and off_peak_elapsed_minutes | float(0) >= 15 }}
  current_total_discharge_w: >-
    {{
      (slot_1_current_target_w | float(0) if slot_1_current_target_w | float(0) > 0 else 0)
      + (slot_2_current_target_w | float(0) if slot_2_current_target_w | float(0) > 0 else 0)
      + (slot_3_current_target_w | float(0) if slot_3_current_target_w | float(0) > 0 else 0)
      + (slot_4_current_target_w | float(0) if slot_4_current_target_w | float(0) > 0 else 0)
    }}
  current_total_charge_w: >-
    {{
      (0 - (slot_1_current_target_w | float(0)) if slot_1_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_2_current_target_w | float(0)) if slot_2_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_3_current_target_w | float(0)) if slot_3_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_4_current_target_w | float(0)) if slot_4_current_target_w | float(0) < 0 else 0)
    }}
  hold_discharge_mode: >-
    {{ current_total_discharge_w >= command_deadband_w
       and import_need_w < command_deadband_w
       and export_surplus_w < release_deadband_w }}
  hold_charge_mode: >-
    {{ current_total_charge_w >= command_deadband_w
       and export_surplus_w < command_deadband_w
       and import_need_w < release_deadband_w }}

  operating_mode: >-
    {% if validation_errors | count > 0 %}
      invalid_config
    {% elif not house_power_valid %}
      invalid_sensor
    {% elif off_peak_ready_to_charge | bool %}
      off_peak_charge
    {% elif off_peak_active | bool %}
      off_peak_idle
    {% elif import_need_w >= command_deadband_w and discharge_capable_count > 0 %}
      discharge
    {% elif hold_discharge_mode %}
      discharge_hold
    {% elif export_surplus_w >= command_deadband_w and charge_capable_count > 0 %}
      charge
    {% elif hold_charge_mode %}
      charge_hold
    {% else %}
      neutral
    {% endif %}

  discharge_hold_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge and battery.commanded_discharge | float(0) > 0 %}
        {% set hold = namespace(better_same_cooldown_waiting=false) %}
        {% for other in batteries %}
          {% if other.slot != battery.slot
                and other.discharge_available
                and other.commanded_discharge | float(0) <= 0
                and other.cooldown_s | float(0) == battery.cooldown_s | float(0)
                and (
                  (other.headroom_priority and not battery.headroom_priority)
                  or (
                    other.headroom_priority == battery.headroom_priority
                    and other.soc | float(0) > battery.soc | float(0)
                  )
                ) %}
            {% set hold.better_same_cooldown_waiting = true %}
          {% endif %}
        {% endfor %}
        {% if not hold.better_same_cooldown_waiting %}
          {% set ns.candidates = ns.candidates + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s', reverse=true) }}
  discharge_residual_order: >-
    {% set ns = namespace(headroom=[], regular=[]) %}
    {% for battery in batteries %}
      {% if battery.discharge_available %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc', reverse=true))
       + ((ns.regular | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s')) }}
  discharge_trim_order: >-
    {% set ns = namespace(regular=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge and battery.commanded_discharge | float(0) > 0 %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ((ns.regular | sort(attribute='soc')) | sort(attribute='cooldown_s'))
       + (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc')) }}
  responsive_discharge_trim_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in discharge_trim_order %}
      {% if battery.cooldown_s | float(0) > 0 %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  responsive_discharge_trim_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in discharge_trim_order %}
      {% if responsive_discharge_trim_cooldown_s | float(0) > 0
            and responsive_discharge_trim_cooldown_s | float(0) <= responsive_trim_max_cooldown_s | float(0)
            and battery.cooldown_s | float(0) == responsive_discharge_trim_cooldown_s | float(0) %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ ns.candidates }}
  responsive_discharge_export_trim_w: >-
    {% if raw_export_w | float(0) <= 0
          or responsive_discharge_trim_cooldown_s | float(0) <= 0
          or responsive_discharge_trim_cooldown_s | float(0) > responsive_trim_max_cooldown_s | float(0) %}
      0
    {% else %}
      {{ [raw_export_w | float(0), release_deadband_w | float(0)] | min }}
    {% endif %}
  cooldown_ready_discharge_export_trim_w: >-
    {% if raw_export_w | float(0) < minimum_target_delta_w | float(0) %}
      0
    {% else %}
      {{ [raw_export_w | float(0), release_deadband_w | float(0)] | min }}
    {% endif %}
  responsive_discharge_target_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in batteries %}
      {% if battery.discharge_available
            and battery.cooldown_s | float(0) > 0
            and battery.cooldown_s | float(0) <= responsive_trim_max_cooldown_s | float(0) %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  off_peak_charge_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_off_peak_charge and battery.soc | float(0) < off_peak_target_soc_pct | float(0) %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='cooldown_s')) | sort(attribute='soc') }}
  off_peak_charge_order_slots: >-
    {% set ns = namespace(slots=[]) %}
    {% for battery in off_peak_charge_order %}
      {% set ns.slots = ns.slots + [battery.slot | int(0)] %}
    {% endfor %}
    {{ ns.slots }}
  off_peak_rank_1: >-
    {% set ns = namespace(rank=0) %}
    {% for battery in off_peak_charge_order %}
      {% if battery.slot | int(0) == 1 %}
        {% set ns.rank = loop.index %}
      {% endif %}
    {% endfor %}
    {{ ns.rank }}
  off_peak_rank_2: >-
    {% set ns = namespace(rank=0) %}
    {% for battery in off_peak_charge_order %}
      {% if battery.slot | int(0) == 2 %}
        {% set ns.rank = loop.index %}
      {% endif %}
    {% endfor %}
    {{ ns.rank }}
  off_peak_rank_3: >-
    {% set ns = namespace(rank=0) %}
    {% for battery in off_peak_charge_order %}
      {% if battery.slot | int(0) == 3 %}
        {% set ns.rank = loop.index %}
      {% endif %}
    {% endfor %}
    {{ ns.rank }}
  off_peak_rank_4: >-
    {% set ns = namespace(rank=0) %}
    {% for battery in off_peak_charge_order %}
      {% if battery.slot | int(0) == 4 %}
        {% set ns.rank = loop.index %}
      {% endif %}
    {% endfor %}
    {{ ns.rank }}
  off_peak_stagger_ready_1: "{{ off_peak_rank_1 | int(0) > 0 and off_peak_elapsed_minutes | float(0) >= off_peak_rank_1 | int(0) * 15 }}"
  off_peak_stagger_ready_2: "{{ off_peak_rank_2 | int(0) > 0 and off_peak_elapsed_minutes | float(0) >= off_peak_rank_2 | int(0) * 15 }}"
  off_peak_stagger_ready_3: "{{ off_peak_rank_3 | int(0) > 0 and off_peak_elapsed_minutes | float(0) >= off_peak_rank_3 | int(0) * 15 }}"
  off_peak_stagger_ready_4: "{{ off_peak_rank_4 | int(0) > 0 and off_peak_elapsed_minutes | float(0) >= off_peak_rank_4 | int(0) * 15 }}"
  charge_order: >-
    {% set ns = namespace(regular=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ((ns.regular | sort(attribute='soc')) | sort(attribute='cooldown_s'))
       + (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc')) }}
  emergency_charge_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='soc')) | sort(attribute='cooldown_s') }}
  responsive_charge_target_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge
            and battery.cooldown_s | float(0) > 0
            and battery.cooldown_s | float(0) <= responsive_trim_max_cooldown_s | float(0) %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  opportunistic_charge_threshold_w: >-
    {% if responsive_charge_target_cooldown_s | float(0) > 0
          and responsive_charge_target_cooldown_s | float(0) <= responsive_trim_max_cooldown_s | float(0) %}
      {{ minimum_target_delta_w | float(0) }}
    {% else %}
      {{ command_deadband_w | float(0) }}
    {% endif %}

  discharge_plan: >-
    {% set ns = namespace(
      remaining=[(import_need_w | float(0)) - (uncommanded_actual_discharge_w | float(0)), 0] | max,
      trim_remaining=0,
      trimmed_locked_w=0,
      chargeable_raw_export_w=raw_export_w | float(0),
      export_latency_brake_w=0,
      t1=0,
      t2=0,
      t3=0,
      t4=0,
      responsive_trim_remaining=0,
      cooldown_ready_trim_remaining=0,
      export_latency_brake_remaining=0
    ) %}
    {% if operating_mode in ['discharge', 'discharge_hold'] %}
      {% for battery in discharge_hold_order %}
        {% set allocation = [battery.commanded_discharge, battery.max_discharge] | min %}
        {% set allocation = [allocation, 0] | max %}
        {% set effective_allocation = [battery.current_discharge, allocation] | min %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
        {% set ns.remaining = [ns.remaining - effective_allocation, 0] | max %}
      {% endfor %}
      {% if operating_mode == 'discharge' %}
        {% for battery in discharge_residual_order %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if ns.remaining > 0 and not battery.discharge_locked %}
            {% set headroom = [battery.max_discharge - current_allocation, 0] | max %}
            {% set allocation = [headroom, ns.remaining] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation + allocation) | round(0) %}
            {% endif %}
            {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% set ns.trim_remaining = discharge_export_guard_w | float(0) %}
      {% for battery in discharge_trim_order %}
        {% if ns.trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > release_deadband_w | float(0)
                and battery.actual_discharge | float(0) > release_deadband_w | float(0) %}
          {% if current_allocation > 0
                and battery.actual_power_fresh
                and battery.target_age_s | float(0) < battery.response_grace_s | float(0)
                and battery.actual_discharge | float(0) > current_allocation + command_deadband_w | float(0) %}
            {% set pending_actual_drop = [battery.actual_discharge | float(0) - current_allocation, ns.trim_remaining] | min %}
            {% set ns.trim_remaining = [ns.trim_remaining - pending_actual_drop, 0] | max %}
            {% if not trim_is_charge_absorbable %}
              {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - pending_actual_drop, 0] | max %}
            {% endif %}
          {% endif %}
          {% set trim_allocation = [current_allocation, ns.trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.trim_remaining = [ns.trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.responsive_trim_remaining = responsive_discharge_export_trim_w | float(0) %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.responsive_trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > release_deadband_w | float(0)
                and battery.actual_discharge | float(0) > release_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.responsive_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.responsive_trim_remaining = [ns.responsive_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set responsive_trim_applied = (responsive_discharge_export_trim_w | float(0)) - (ns.responsive_trim_remaining | float(0)) %}
      {% set ns.cooldown_ready_trim_remaining = [(cooldown_ready_discharge_export_trim_w | float(0)) - responsive_trim_applied, 0] | max %}
      {% for battery in discharge_trim_order %}
        {% if ns.cooldown_ready_trim_remaining > 0 and not battery.discharge_locked %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > release_deadband_w | float(0)
                and battery.actual_discharge | float(0) > release_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.cooldown_ready_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if trim_allocation > 0 and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.cooldown_ready_trim_remaining = [ns.cooldown_ready_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.export_latency_brake_remaining = [raw_export_w | float(0) - release_deadband_w | float(0), 0] | max %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.export_latency_brake_remaining > 0
              and battery.can_charge
              and battery.actual_power_fresh %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if current_allocation > 0
                and battery.actual_discharge | float(0) > release_deadband_w | float(0) %}
            {% set brake_allocation = [current_allocation, ns.export_latency_brake_remaining] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation - brake_allocation) | round(0) %}
            {% endif %}
            {% set ns.export_latency_brake_w = ns.export_latency_brake_w + brake_allocation %}
            {% set ns.export_latency_brake_remaining = [ns.export_latency_brake_remaining - brake_allocation, 0] | max %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {
      'targets': {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4},
      'trimmed_locked_w': ns.trimmed_locked_w | round(0),
      'unresolved_raw_export_w': ns.trim_remaining | round(0),
      'chargeable_raw_export_w': ns.chargeable_raw_export_w | round(0),
      'export_latency_brake_w': ns.export_latency_brake_w | round(0)
    } }}
  discharge_targets: "{{ discharge_plan['targets'] }}"
  unresolved_raw_export_w: "{{ discharge_plan['unresolved_raw_export_w'] | float(0) }}"
  chargeable_raw_export_w: "{{ discharge_plan['chargeable_raw_export_w'] | float(0) }}"
  export_latency_brake_w: "{{ discharge_plan['export_latency_brake_w'] | float(0) }}"
  emergency_charge_surplus_w: >-
    {% if operating_mode in ['discharge', 'discharge_hold', 'charge']
          and charge_capable_count | int(0) > 0
          and chargeable_raw_export_w | float(0) >= opportunistic_charge_threshold_w | float(0) %}
      {{ chargeable_raw_export_w | float(0) }}
    {% else %}
      0
    {% endif %}
  emergency_charge_active: "{{ emergency_charge_surplus_w | float(0) >= opportunistic_charge_threshold_w | float(0) }}"
  charge_targets: >-
    {% set batteries = emergency_charge_order if emergency_charge_active | bool else charge_order %}
    {% set charge_need = emergency_charge_surplus_w | float(0) if emergency_charge_active | bool else export_surplus_w | float(0) %}
    {% set ns = namespace(remaining=[(charge_need | float(0)) - (uncommanded_actual_charge_w | float(0)), 0] | max, t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'off_peak_charge' %}
      {% set ns.remaining = [(off_peak_available_charge_w | float(0)) - (uncommanded_actual_charge_w | float(0)), 0] | max %}
      {% for battery in off_peak_charge_order %}
        {% set stagger_ready = off_peak_elapsed_minutes | float(0) >= loop.index * 15 %}
        {% if stagger_ready and battery.charge_locked %}
          {% set allocation = [battery.current_charge, battery.max_charge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in off_peak_charge_order %}
        {% set stagger_ready = off_peak_elapsed_minutes | float(0) >= loop.index * 15 %}
        {% if ns.remaining > 0 and stagger_ready and not battery.charge_locked %}
          {% set allocation = [battery.max_charge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% elif operating_mode == 'charge' or emergency_charge_active | bool %}
      {% for battery in batteries %}
        {% set battery_discharge_target = 0 %}
        {% if battery.slot == 1 %}
          {% set battery_discharge_target = discharge_target_1 | float(0) %}
        {% elif battery.slot == 2 %}
          {% set battery_discharge_target = discharge_target_2 | float(0) %}
        {% elif battery.slot == 3 %}
          {% set battery_discharge_target = discharge_target_3 | float(0) %}
        {% elif battery.slot == 4 %}
          {% set battery_discharge_target = discharge_target_4 | float(0) %}
        {% endif %}
        {% if battery.charge_locked
              and (operating_mode == 'charge' or battery_discharge_target < command_deadband_w | float(0)) %}
          {% set allocation = [battery.current_charge, battery.max_charge] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% for battery in batteries %}
        {% set battery_discharge_target = 0 %}
        {% if battery.slot == 1 %}
          {% set battery_discharge_target = discharge_target_1 | float(0) %}
        {% elif battery.slot == 2 %}
          {% set battery_discharge_target = discharge_target_2 | float(0) %}
        {% elif battery.slot == 3 %}
          {% set battery_discharge_target = discharge_target_3 | float(0) %}
        {% elif battery.slot == 4 %}
          {% set battery_discharge_target = discharge_target_4 | float(0) %}
        {% endif %}
        {% if not battery.charge_locked
              and (operating_mode == 'charge' or battery_discharge_target < command_deadband_w | float(0)) %}
          {% set allocation = [battery.max_charge, ns.remaining] | min %}
          {% set allocation = [allocation, 0] | max %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = allocation | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = allocation | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = allocation | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = allocation | round(0) %}
          {% endif %}
          {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
        {% endif %}
      {% endfor %}
    {% elif operating_mode == 'charge_hold' %}
      {% for battery in batteries %}
        {% set allocation = battery.current_charge | float(0) %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  neutral_targets: >-
    {% set ns = namespace(t1=0, t2=0, t3=0, t4=0) %}
    {% if operating_mode == 'neutral' %}
      {% for battery in batteries %}
        {% set hold_power = battery.current_target | float(0) %}
        {% set hold_power = [hold_power, battery.max_discharge | float(0)] | min %}
        {% set hold_power = [hold_power, 0 - (battery.max_charge | float(0))] | max %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = hold_power | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = hold_power | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = hold_power | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = hold_power | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  discharge_trimmed_locked_w: "{{ discharge_plan['trimmed_locked_w'] | float(0) }}"

  discharge_target_1: "{{ discharge_targets['1'] | float(0) }}"
  discharge_target_2: "{{ discharge_targets['2'] | float(0) }}"
  discharge_target_3: "{{ discharge_targets['3'] | float(0) }}"
  discharge_target_4: "{{ discharge_targets['4'] | float(0) }}"

  charge_target_1: "{{ charge_targets['1'] | float(0) }}"
  charge_target_2: "{{ charge_targets['2'] | float(0) }}"
  charge_target_3: "{{ charge_targets['3'] | float(0) }}"
  charge_target_4: "{{ charge_targets['4'] | float(0) }}"
  neutral_target_1: "{{ neutral_targets['1'] | float(0) }}"
  neutral_target_2: "{{ neutral_targets['2'] | float(0) }}"
  neutral_target_3: "{{ neutral_targets['3'] | float(0) }}"
  neutral_target_4: "{{ neutral_targets['4'] | float(0) }}"

  locked_discharge_reduction_pending: >-
    {{
      (
        slot_1_current_target_w | float(0) > 0
        and discharge_target_1 | float(0) >= command_deadband_w | float(0)
        and discharge_target_1 | float(0) < slot_1_current_target_w | float(0) - minimum_target_delta_w | float(0)
        and not (discharge_cooldown_ok_1 | bool)
      )
      or (
        slot_2_current_target_w | float(0) > 0
        and discharge_target_2 | float(0) >= command_deadband_w | float(0)
        and discharge_target_2 | float(0) < slot_2_current_target_w | float(0) - minimum_target_delta_w | float(0)
        and not (discharge_cooldown_ok_2 | bool)
      )
      or (
        slot_3_current_target_w | float(0) > 0
        and discharge_target_3 | float(0) >= command_deadband_w | float(0)
        and discharge_target_3 | float(0) < slot_3_current_target_w | float(0) - minimum_target_delta_w | float(0)
        and not (discharge_cooldown_ok_3 | bool)
      )
      or (
        slot_4_current_target_w | float(0) > 0
        and discharge_target_4 | float(0) >= command_deadband_w | float(0)
        and discharge_target_4 | float(0) < slot_4_current_target_w | float(0) - minimum_target_delta_w | float(0)
        and not (discharge_cooldown_ok_4 | bool)
      )
    }}

  [[generated.command_vars]]
  pending_slot_target_updates: >-
    {{
      (should_write_target_power_1 | bool)
      or (should_write_target_power_2 | bool)
      or (should_write_target_power_3 | bool)
      or (should_write_target_power_4 | bool)
    }}
  pending_slot_actions: >-
    {{
      (should_run_discharge_actions_1 | bool)
      or (should_run_discharge_actions_2 | bool)
      or (should_run_discharge_actions_3 | bool)
      or (should_run_discharge_actions_4 | bool)
      or (should_run_charge_actions_1 | bool)
      or (should_run_charge_actions_2 | bool)
      or (should_run_charge_actions_3 | bool)
      or (should_run_charge_actions_4 | bool)
    }}
  should_stop_small_house_power_delta: >-
    {{
      (should_skip_small_house_power_delta | bool)
      and not (pending_slot_target_updates | bool)
      and not (pending_slot_actions | bool)
    }}
  run_log_reason: >-
    {% if should_stop_small_house_power_delta %}
      small_delta_skipped
    {% elif validation_errors | count > 0 %}
      invalid_config
    {% elif operating_mode == 'invalid_sensor' %}
      invalid_sensor
    {% elif off_peak_active | bool and off_peak_import_limit_w | float(0) <= 0 %}
      off_peak_disabled_by_import_limit
    {% elif off_peak_active | bool and not (solar_forecast_tomorrow_valid | bool) %}
      off_peak_invalid_solar_forecast
    {% elif off_peak_active | bool and off_peak_total_capacity_kwh | float(0) <= 0 %}
      off_peak_no_configured_capacity
    {% elif off_peak_active | bool and off_peak_elapsed_minutes | float(0) < 15 %}
      off_peak_waiting_for_stagger
    {% elif off_peak_active | bool and off_peak_available_charge_w | float(0) < command_deadband_w | float(0) %}
      off_peak_import_limit_reached
    {% else %}
      {{ operating_mode }}
    {% endif %}
  run_log_slots_json: >-
    {{ {
      '1': {
        'used': slot_1_used | bool,
        'soc': slot_1_soc | float(0),
        'headroom_priority': slot_1_soc | float(0) >= high_soc_headroom_threshold_pct | float(0),
        'cooldown_s': battery_1_cooldown_seconds | float(0),
        'max_discharge_w': battery_1_max_discharge_w | float(0),
        'max_charge_w': battery_1_max_charge_w | float(0),
        'usable_capacity_kwh': battery_1_usable_capacity_kwh | float(0),
        'off_peak_charge_enabled': battery_1_off_peak_charge_enabled | bool,
        'can_off_peak_charge': slot_1_can_off_peak_charge | bool,
        'off_peak_rank': off_peak_rank_1 | int(0),
        'off_peak_stagger_ready': off_peak_stagger_ready_1 | bool,
        'current_target_w': slot_1_current_target_w | float(0),
        'signed_target_w': signed_target_1 | float(0),
        'discharge_target_w': discharge_target_1 | float(0),
        'charge_target_w': charge_target_1 | float(0),
        'neutral_target_w': neutral_target_1 | float(0),
        'actual_discharge_w': slot_1_actual_discharge_w | float(0),
        'actual_charge_w': slot_1_actual_charge_w | float(0),
        'actual_power_fresh': slot_1_actual_power_fresh | bool,
        'actual_power_stale': slot_1_actual_power_stale | bool,
        'actual_power_usable': slot_1_actual_power_usable | bool,
        'actual_power_age_s': slot_1_actual_power_age_s | float(999999),
        'target_age_s': slot_1_target_age_s | float(0),
        'response_grace_s': slot_1_response_grace_s | float(0),
        'discharge_delivery_stalled': slot_1_discharge_delivery_stalled | bool,
        'can_charge': slot_1_can_charge | bool,
        'discharge_available': (slot_1_can_discharge | bool) and not (slot_1_discharge_delivery_stalled | bool),
        'discharge_locked': (not (discharge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) > 0 and not (slot_1_discharge_delivery_stalled | bool),
