responsive_target_allowed___SLOT__: >-
  {{ battery___SLOT___cooldown_seconds | float(0) > 0
     and battery___SLOT___cooldown_seconds | float(0) <= responsive_trim_max_cooldown_s | float(0)
     and (
       (
         slot___SLOT___can_discharge | bool
         and battery___SLOT___cooldown_seconds | float(0) == responsive_discharge_target_cooldown_s | float(0)
       )
       or (
         slot___SLOT___can_charge | bool
         and battery___SLOT___cooldown_seconds | float(0) == responsive_charge_target_cooldown_s | float(0)
       )
     ) }}
slot_command_deadband_w___SLOT__: >-
  {% if responsive_target_allowed___SLOT__ | bool %}
    {{ minimum_target_delta_w | float(0) }}
  {% else %}
    {{ command_deadband_w | float(0) }}
  {% endif %}
discharge_active___SLOT__: "{{ operating_mode in ['discharge', 'discharge_hold'] and discharge_target___SLOT__ >= slot_command_deadband_w___SLOT__ | float(0) }}"
charge_active___SLOT__: "{{ (operating_mode in ['charge', 'charge_hold', 'off_peak_charge'] or emergency_charge_active | bool) and charge_target___SLOT__ >= slot_command_deadband_w___SLOT__ | float(0) }}"
neutral_hold_active___SLOT__: "{{ operating_mode == 'neutral' and neutral_target___SLOT__ | abs >= slot_command_deadband_w___SLOT__ | float(0) }}"
signed_target___SLOT__: >-
  {% if discharge_active___SLOT__ %}
    {{ discharge_target___SLOT__ | float(0) }}
  {% elif charge_active___SLOT__ %}
    {{ 0 - (charge_target___SLOT__ | float(0)) }}
  {% elif neutral_hold_active___SLOT__ %}
    {{ neutral_target___SLOT__ | float(0) }}
  {% else %}
    0
  {% endif %}
desired_target_sign___SLOT__: >-
  {% if signed_target___SLOT__ | float(0) > 0 %}
    1
  {% elif signed_target___SLOT__ | float(0) < 0 %}
    -1
  {% else %}
    0
  {% endif %}
current_target_rounded___SLOT__: "{{ slot___SLOT___current_target_w | float(0) | round(0) | int(0) }}"
desired_target_rounded___SLOT__: "{{ signed_target___SLOT__ | float(0) | round(0) | int(0) }}"
target_value_changed___SLOT__: "{{ desired_target_rounded___SLOT__ | int(0) != current_target_rounded___SLOT__ | int(0) }}"
same_direction_target_delta_w___SLOT__: "{{ (desired_target_rounded___SLOT__ | int(0) - current_target_rounded___SLOT__ | int(0)) | abs }}"
same_direction_small_adjustment___SLOT__: >-
  {{ target_value_changed___SLOT__ | bool
     and desired_target_sign___SLOT__ | int(0) != 0
     and desired_target_sign___SLOT__ | int(0) == slot___SLOT___current_target_sign | int(0)
     and same_direction_target_delta_w___SLOT__ | float(0) < minimum_target_delta_w | float(0) }}
start_from_zero_flow_confirmed___SLOT__: >-
  {{ slot___SLOT___current_target_sign | int(0) == 0
     and allow_confirmed_flow_start_from_zero | bool
     and (
       (desired_target_sign___SLOT__ | int(0) == 1
        and house_power_valid
        and house_power_w | float(0) >= command_deadband_w | float(0))
       or
       (desired_target_sign___SLOT__ | int(0) == -1
        and house_power_valid
        and house_power_w | float(0) <= 0 - (command_deadband_w | float(0)))
     ) }}
discharge_increase_blocked_by_locked_reduction___SLOT__: >-
  {{ locked_discharge_reduction_pending | bool
     and signed_target___SLOT__ | float(0) > slot___SLOT___current_target_w | float(0)
     and signed_target___SLOT__ | float(0) > 0
     and (signed_target___SLOT__ | float(0) - slot___SLOT___current_target_w | float(0)) > [house_power_w | float(0), 0] | max
     and not (discharge_export_guard_active | bool) }}
should_write_target_power___SLOT__: >-
  {% if not slot___SLOT___target_entity_configured %}
    false
  {% elif desired_target_sign___SLOT__ | int(0) == 0 %}
    {{ slot___SLOT___current_target_sign | int(0) != 0 }}
  {% elif desired_target_sign___SLOT__ | int(0) != slot___SLOT___current_target_sign | int(0)
        and slot___SLOT___current_target_sign | int(0) != 0 %}
    true
  {% elif not (target_value_changed___SLOT__ | bool) %}
    false
  {% elif same_direction_small_adjustment___SLOT__ | bool %}
    false
  {% elif discharge_increase_blocked_by_locked_reduction___SLOT__ | bool %}
    false
  {% elif start_from_zero_flow_confirmed___SLOT__ | bool %}
    true
  {% elif signed_target___SLOT__ | float(0) > 0 %}
    {{ discharge_cooldown_ok___SLOT__
       or (discharge_export_guard_active
           and slot___SLOT___current_target_w | float(0) > 0
           and signed_target___SLOT__ | float(0) < slot___SLOT___current_target_w | float(0)) }}
  {% elif signed_target___SLOT__ | float(0) < 0 %}
    {{ charge_cooldown_ok___SLOT__ }}
  {% else %}
    false
  {% endif %}
should_run_discharge_actions___SLOT__: >-
  {% if not slot___SLOT___has_discharge_actions or signed_target___SLOT__ | float(0) <= 0 %}
    false
  {% elif discharge_increase_blocked_by_locked_reduction___SLOT__ | bool %}
    false
  {% elif slot___SLOT___current_target_sign | int(0) != 1 %}
    {{ start_from_zero_flow_confirmed___SLOT__ | bool
       or (responsive_target_allowed___SLOT__ | bool and signed_target___SLOT__ | float(0) > 0)
       or slot___SLOT___current_target_sign | int(0) != 0 }}
  {% elif not (target_value_changed___SLOT__ | bool) %}
    false
  {% elif same_direction_small_adjustment___SLOT__ | bool %}
    false
  {% else %}
    {{ discharge_cooldown_ok___SLOT__
       or (discharge_export_guard_active
           and slot___SLOT___current_target_w | float(0) > 0
           and signed_target___SLOT__ | float(0) < slot___SLOT___current_target_w | float(0)) }}
  {% endif %}
should_run_charge_actions___SLOT__: >-
  {% if not slot___SLOT___has_charge_actions or signed_target___SLOT__ | float(0) >= 0 %}
    false
  {% elif slot___SLOT___current_target_sign | int(0) != -1 %}
    {{ start_from_zero_flow_confirmed___SLOT__ | bool
       or (operating_mode == 'off_peak_charge' and charge_cooldown_ok___SLOT__ | bool)
       or (responsive_target_allowed___SLOT__ | bool and signed_target___SLOT__ | float(0) < 0)
       or slot___SLOT___current_target_sign | int(0) != 0 }}
  {% elif not (target_value_changed___SLOT__ | bool) %}
    false
  {% elif same_direction_small_adjustment___SLOT__ | bool %}
    false
  {% else %}
    {{ charge_cooldown_ok___SLOT__ }}
  {% endif %}
