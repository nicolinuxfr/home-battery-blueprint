mode: restart

triggers:
  - trigger: homeassistant
    event: start
  - trigger: event
    event_type: automation_reloaded
  - trigger: state
    entity_id: !input house_power_sensor
    not_to: null
  - trigger: state
    entity_id: !input off_peak_entities
    to: "on"
    for: "00:00:15"
  - trigger: state
    entity_id: !input off_peak_entities
    from: "on"

variables:
  house_power_sensor: !input house_power_sensor
  off_peak_entities: !input off_peak_entities
  control_deadband_w: 10
  high_soc_headroom_threshold_pct: 90
  low_soc_priority_margin_pct: 5
  low_soc_priority_gap_pct: 20
  discharge_increase_step_w: 250
  responsive_discharge_increase_step_w: 500
  strong_import_threshold_w: 800
  strong_import_discharge_increase_step_w: 1200
  strong_import_discharge_budget_share_pct: 75

  allow_confirmed_flow_start_from_zero: true
  # Reactive batteries may restart from 0 on confirmed flow immediately.
  # Stable batteries still wait for their cooldown to avoid import/export yo-yo.
  actual_power_stale_timeout_s: 300
  run_started_ts: "{{ as_timestamp(now()) }}"
  battery_slot: 0
  battery_soc: 0
  target_power_w: 0
  target_discharge_w: 0
  target_charge_w: 0

  battery_1_soc_sensor: !input battery_1_soc_sensor
  battery_1_max_discharge_w: !input battery_1_max_discharge_w
  battery_1_min_discharge_soc_pct: !input battery_1_min_discharge_soc_pct
  battery_1_max_charge_w: !input battery_1_max_charge_w
  battery_1_reactive: !input battery_1_reactive
  battery_1_cooldown_seconds: !input battery_1_cooldown_seconds
  battery_1_target_power_entity: !input battery_1_target_power_entity
  battery_1_target_power_uses_absolute_value: !input battery_1_target_power_uses_absolute_value
  battery_1_actual_power_sensor: !input battery_1_actual_power_sensor
  battery_1_discharge_actions: !input battery_1_discharge_actions
  battery_1_charge_actions: !input battery_1_charge_actions
  battery_1_night_charge_actions: !input battery_1_night_charge_actions
  
  battery_2_soc_sensor: !input battery_2_soc_sensor
  battery_2_max_discharge_w: !input battery_2_max_discharge_w
  battery_2_min_discharge_soc_pct: !input battery_2_min_discharge_soc_pct
  battery_2_max_charge_w: !input battery_2_max_charge_w
  battery_2_reactive: !input battery_2_reactive
