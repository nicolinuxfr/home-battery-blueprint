blueprint:
  name: "Smart Home Battery (2026.4.9)"
  description: |-
    Generic Home Assistant blueprint for up to four batteries. It allocates discharge from house demand, can trigger opportunistic charging during real export, pauses normal target control during off-peak periods to run night charge actions, and writes a signed power target for each battery into a numeric entity, with optional custom actions for integrations that need a separate mode switch.

    Version: 2026.4.9 - [Changelog](https://github.com/nicolinuxfr/home-battery-blueprint/blob/main/CHANGELOG.md#202649)
  domain: automation
  source_url: https://github.com/nicolinuxfr/home-battery-blueprint
  homeassistant:
    min_version: 2024.6.0
  input:
    house_power_sensor:
      name: "House power sensor"
      description: "Main house power sensor. This selector only shows power sensors. Use a signed sensor in watts with positive values for import and negative values for export."
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: power
    off_peak_entities:
      name: "Active off-peak entities"
      description: "Optional entities that turn on during off-peak periods. If at least one selected entity stays on for 15 seconds, the blueprint stops normal target control and runs the configured night charge actions. Leaving on is handled immediately."
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
            - domain: input_boolean
            - domain: schedule
    # Each battery slot is driven through a signed numeric target entity.
    # Optional active-mode actions can translate that target to vendor-specific controls.
    # Generated SoC selectors are limited to battery percentage sensors.
    battery_1_section:
      name: "Battery 1"
      icon: mdi:battery
      collapsed: true
      input:
        battery_1_soc_sensor:
          name: "State of charge sensor"
          description: "Leave empty to ignore this battery slot. Otherwise, this selector only shows battery sensors that report a charge percentage, and the chosen sensor enables the slot. An enabled slot must also expose a numeric target entity and at least one non-zero power limit."
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: battery
        battery_1_max_discharge_w:
          name: "Maximum discharge power"
          description: "Manual discharge limit used by the allocator for this battery."
          default: 0
          selector:
            number:
              min: 0
              max: 5000
              step: 10
              unit_of_measurement: W
              mode: box
        battery_1_min_discharge_soc_pct:
          name: "Minimum state of charge for discharge"
          description: "Minimum state of charge required before this battery can be assigned discharge power. If the battery is below this threshold, the blueprint removes it from discharge allocation and writes 0 if it still has an active discharge target."
          default: 15
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider
        battery_1_max_charge_w:
          name: "Maximum charge power"
          description: "Manual charge limit used by the allocator for opportunistic charging from real export. Set to 0 if this battery must never be charged by the blueprint."
          default: 0
          selector:
            number:
              min: 0
              max: 5000
              step: 10
              unit_of_measurement: W
              mode: box
        battery_1_reactive:
          name: "Reactive battery"
          description: "Enable this option to make the battery reactive: it will be adjusted frequently to absorb residual demand changes and recover export as soon as possible. Leave it off (default) for stable behavior where the battery keeps a steady target and lets reactive batteries handle the variations."
          default: false
          selector:
            boolean: {}
        battery_1_cooldown_seconds:
          name: "Command cooldown"
          description: "Minimum delay between two active target updates for this battery. A short cooldown works best with reactive batteries so they can quickly absorb residual changes. A longer cooldown keeps the target steadier. Set it to 0 to disable the delay entirely. Writing `0` can still happen immediately so the blueprint can stop a battery for safety. Reactive batteries can restart from `0` immediately when the raw house meter confirms matching import or export. Non-reactive batteries wait for their cooldown before restarting from `0`, while raw export can still reduce an active discharge target before the cooldown expires."
          default: 0
          selector:
            number:
              min: 0
              max: 300
              step: 5
              unit_of_measurement: s
              mode: slider
        battery_1_target_power_entity:
          name: "Target power entity"
          description: "The `number` or `input_number` entity written by the blueprint. The target is signed in watts: positive for discharge, negative for charge, `0` for stop. If this battery should charge, the selected entity must accept negative values."
          default: ""
          selector:
            entity:
              filter:
                - domain: number
                - domain: input_number
        battery_1_target_power_uses_absolute_value:
          name: "Target entity uses absolute values"
          description: "Enable this when the target entity expects a positive power magnitude for both charge and discharge. The blueprint keeps its internal signed target, but writes the absolute value to this entity. Use charge and discharge actions to select the battery mode when the integration needs a separate direction control."
          default: false
          selector:
            boolean: {}
        battery_1_actual_power_sensor:
          name: "Actual power sensor"
          description: "Optional power sensor that reports the battery's real output in watts. The allocator still uses the target entity and the house meter as its primary control loop. After the response grace period, a valid non-stale reading is used only as a guardrail to avoid counting a battery as real supply when it is no longer delivering. A stale reading does not prevent an idle battery from starting. If telemetry stays stale after an active target had time to react, that battery is kept out of extra discharge allocation while its already active target can stay in place unless a stop, sign change, or real export requires changing it."
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: power
        battery_1_discharge_actions:
          name: "Discharge actions"
          description: "Optional custom actions executed when this battery should actively discharge, and again when it should stop but still reports physical discharge. They run on every active discharge target update. Variables such as battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w and export_surplus_w are available inside these actions; target variables are initialized globally and then overwritten with the current slot values before this sequence runs."
          default: []
          selector:
            action: {}
        battery_1_charge_actions:
          name: "Charge actions"
          description: "Optional custom actions executed when this battery should actively charge from surplus export, and again when it should stop but still reports physical charge. They run on every active charge target update. Variables such as battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w and export_surplus_w are available inside these actions; target variables are initialized globally and then overwritten with the current slot values before this sequence runs."
          default: []
          selector:
            action: {}
        battery_1_night_charge_actions:
          name: "Night charge actions"
          description: "Optional custom actions executed when off-peak periods become active, and after Home Assistant start or automation reload if an off-peak period is already active. Use them to put this battery in its overnight charging mode; while off-peak remains active, normal target writes and charge/discharge actions are skipped after these actions run. Variables such as battery_slot, battery_soc, target_power_w, target_discharge_w, target_charge_w, house_power_w, import_need_w, export_surplus_w and off_peak_active are available inside these actions."
          default: []
          selector:
            action: {}
    
    battery_2_section:
      name: "Battery 2"
      icon: mdi:battery
      collapsed: true
      input:
        battery_2_soc_sensor:
          name: "State of charge sensor"
          description: "Leave empty to ignore this battery slot. Otherwise, this selector only shows battery sensors that report a charge percentage, and the chosen sensor enables the slot. An enabled slot must also expose a numeric target entity and at least one non-zero power limit."
