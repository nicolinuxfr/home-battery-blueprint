actions:
  - alias: "Emit full run log event"
    event: home_battery_blueprint_run
    event_data:
      reason: "{{ run_log_reason }}"
      trigger_entity_id: "{{ trigger_entity_id }}"
      triggered_by_house_power_sensor: "{{ triggered_by_house_power_sensor }}"
      triggered_by_off_peak_entity: "{{ triggered_by_off_peak_entity }}"
      triggered_by_start_or_reload: "{{ triggered_by_start_or_reload }}"
      off_peak_trigger_entered_active: "{{ off_peak_trigger_entered_active }}"
      operating_mode: "{{ operating_mode }}"
      off_peak_active: "{{ off_peak_active }}"
      house_power_valid: "{{ house_power_valid }}"
      house_power_w: "{{ house_power_w | float(0) | round(1) }}"
      adjusted_house_power_w: "{{ adjusted_house_power_w | float(0) | round(1) }}"
      import_need_w: "{{ import_need_w | float(0) | round(1) }}"
      export_surplus_w: "{{ export_surplus_w | float(0) | round(1) }}"
      current_total_discharge_w: "{{ current_total_discharge_w | float(0) | round(1) }}"
      current_total_charge_w: "{{ current_total_charge_w | float(0) | round(1) }}"
      zero_target_actual_discharge_w: "{{ zero_target_actual_discharge_w | float(0) | round(1) }}"
      zero_target_actual_charge_w: "{{ zero_target_actual_charge_w | float(0) | round(1) }}"
      planned_discharge_total_w: "{{ planned_discharge_total_w | float(0) | round(1) }}"
      planned_charge_total_w: "{{ planned_charge_total_w | float(0) | round(1) }}"
      corrected_import_need_w: "{{ corrected_import_need_w | float(0) | round(1) }}"
      corrected_export_surplus_w: "{{ corrected_export_surplus_w | float(0) | round(1) }}"
      possible_duplicate_discharge_w: "{{ possible_duplicate_discharge_w | float(0) | round(1) }}"
      possible_duplicate_charge_w: "{{ possible_duplicate_charge_w | float(0) | round(1) }}"
      discharge_increase_budget_w: "{{ discharge_increase_budget_w | float(0) | round(1) }}"
      discharge_increase_step_w: "{{ discharge_increase_step_w | float(0) | round(1) }}"
      responsive_discharge_increase_step_w: "{{ responsive_discharge_increase_step_w | float(0) | round(1) }}"
      strong_import_threshold_w: "{{ strong_import_threshold_w | float(0) | round(1) }}"
      strong_import_discharge_increase_step_w: "{{ strong_import_discharge_increase_step_w | float(0) | round(1) }}"
      strong_import_discharge_budget_share_pct: "{{ strong_import_discharge_budget_share_pct | float(0) | round(1) }}"
      low_soc_priority_margin_pct: "{{ low_soc_priority_margin_pct | float(0) | round(1) }}"
      low_soc_priority_gap_pct: "{{ low_soc_priority_gap_pct | float(0) | round(1) }}"
      soft_low_discharge_priority_active: "{{ soft_low_discharge_priority_active }}"
      discharge_export_guard_w: "{{ discharge_export_guard_w | float(0) | round(1) }}"
      responsive_discharge_export_trim_w: "{{ responsive_discharge_export_trim_w | float(0) | round(1) }}"
      cooldown_ready_discharge_export_trim_w: "{{ cooldown_ready_discharge_export_trim_w | float(0) | round(1) }}"
      discharge_trimmed_locked_w: "{{ discharge_trimmed_locked_w | float(0) | round(1) }}"
      unresolved_raw_export_w: "{{ unresolved_raw_export_w | float(0) | round(1) }}"
      chargeable_raw_export_w: "{{ chargeable_raw_export_w | float(0) | round(1) }}"
      export_latency_brake_w: "{{ export_latency_brake_w | float(0) | round(1) }}"
      emergency_charge_surplus_w: "{{ emergency_charge_surplus_w | float(0) | round(1) }}"
      opportunistic_charge_threshold_w: "{{ opportunistic_charge_threshold_w | float(0) | round(1) }}"
      validation_errors: "{{ validation_errors | tojson }}"
      discharge_targets: "{{ discharge_targets | tojson }}"
      charge_targets: "{{ charge_targets | tojson }}"
      neutral_targets: "{{ neutral_targets | tojson }}"
      slots: "{{ run_log_slots_json | from_json }}"

  # During off-peak periods, custom night-charge actions own the battery mode
  # and charge power. Keep them short/idempotent, or call script.turn_on.
  - alias: "Battery 1: run night charge actions"
    choose:
      - alias: "Battery 1: night charge actions required"
        conditions:
          - condition: template
            value_template: "{{ should_run_night_charge_actions_1 }}"
        sequence:
          - alias: "Battery 1: prepare night charge action context"
            variables:
              battery_slot: 1
              battery_soc: "{{ slot_1_soc }}"
              house_power_w: "{{ house_power_w }}"
              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_1 | float(0) }}"
              target_discharge_w: "{{ discharge_target_1 | float(0) }}"
              target_charge_w: "{{ charge_target_1 | float(0) }}"
          - alias: "Battery 1: execute night charge action sequence"
            choose: []
            default: !input battery_1_night_charge_actions
  
  - alias: "Battery 2: run night charge actions"
    choose:
      - alias: "Battery 2: night charge actions required"
        conditions:
          - condition: template
            value_template: "{{ should_run_night_charge_actions_2 }}"
        sequence:
