        'responsive': battery_3_reactive | bool,
        'current_target': current_target,
        'max_discharge': battery_3_max_discharge_w | float(0),
        'min_discharge_soc_pct': battery_3_min_discharge_soc_pct | float(0),
        'max_charge': battery_3_max_charge_w | float(0),
        'can_discharge': slot_3_can_discharge | bool,
        'discharge_available': (slot_3_can_discharge | bool) and not (slot_3_discharge_delivery_stalled | bool),
        'soft_low_soc_priority': (slot_3_can_discharge | bool) and not (slot_3_discharge_delivery_stalled | bool) and slot_3_soc | float(0) <= battery_3_min_discharge_soc_pct | float(0) + low_soc_priority_margin_pct | float(0),
        'can_charge': slot_3_can_charge | bool,
        'commanded_discharge': commanded_discharge,
        'commanded_charge': commanded_charge,
        'current_discharge': reserved_discharge,
        'current_charge': reserved_charge,
        'actual_power_fresh': slot_3_actual_power_fresh | bool,
        'actual_power_stale': slot_3_actual_power_stale | bool,
        'actual_power_usable': slot_3_actual_power_usable | bool,
        'actual_discharge': slot_3_actual_discharge_w | float(0),
        'target_age_s': slot_3_target_age_s | float(0),
        'response_grace_s': slot_3_response_grace_s | float(0),
        'discharge_delivery_stalled': slot_3_discharge_delivery_stalled | bool,
        'discharge_locked': slot_3_can_discharge and not (battery_3_target_power_uses_absolute_value | bool and off_peak_active | bool) and not (slot_3_discharge_delivery_stalled | bool) and current_target > 0 and not (discharge_cooldown_ok_3 | bool),
        'charge_locked': slot_3_can_charge and (current_target < 0 or (battery_3_target_power_uses_absolute_value | bool and off_peak_active | bool and current_target > 0)) and not (charge_cooldown_ok_3 | bool)
      }] %}
    {% endif %}
    
    {% if slot_4_used %}
      {% set current_target = slot_4_current_target_w | float(0) %}
      {% if battery_4_target_power_uses_absolute_value | bool and off_peak_active | bool %}
        {% set commanded_discharge = 0 %}
        {% set commanded_charge = [current_target, 0] | max %}
        {% set reserved_discharge = 0 %}
        {% set reserved_charge = [current_target, 0] | max %}
      {% else %}
        {% set commanded_discharge = [current_target, 0] | max %}
        {% set commanded_charge = [0 - current_target, 0] | max %}
        {% set reserved_balance_power = slot_4_reserved_balance_power | float(0) %}
        {% set reserved_discharge = [reserved_balance_power, 0] | max %}
        {% set reserved_charge = [0 - reserved_balance_power, 0] | max %}
      {% endif %}
      {% set commanded_discharge = [commanded_discharge, battery_4_max_discharge_w | float(0)] | min %}
      {% set commanded_charge = [commanded_charge, battery_4_max_charge_w | float(0)] | min %}
      {% set reserved_discharge = [reserved_discharge, battery_4_max_discharge_w | float(0)] | min %}
      {% set reserved_charge = [reserved_charge, battery_4_max_charge_w | float(0)] | min %}
      {% set ns.items = ns.items + [{
        'slot': 4,
        'soc': slot_4_soc | float(0),
        'headroom_priority': slot_4_soc | float(0) >= high_soc_headroom_threshold_pct | float(0),
        'cooldown_s': battery_4_cooldown_seconds | float(0),
        'responsive': battery_4_reactive | bool,
        'current_target': current_target,
        'max_discharge': battery_4_max_discharge_w | float(0),
        'min_discharge_soc_pct': battery_4_min_discharge_soc_pct | float(0),
        'max_charge': battery_4_max_charge_w | float(0),
        'can_discharge': slot_4_can_discharge | bool,
        'discharge_available': (slot_4_can_discharge | bool) and not (slot_4_discharge_delivery_stalled | bool),
        'soft_low_soc_priority': (slot_4_can_discharge | bool) and not (slot_4_discharge_delivery_stalled | bool) and slot_4_soc | float(0) <= battery_4_min_discharge_soc_pct | float(0) + low_soc_priority_margin_pct | float(0),
        'can_charge': slot_4_can_charge | bool,
        'commanded_discharge': commanded_discharge,
        'commanded_charge': commanded_charge,
        'current_discharge': reserved_discharge,
        'current_charge': reserved_charge,
        'actual_power_fresh': slot_4_actual_power_fresh | bool,
        'actual_power_stale': slot_4_actual_power_stale | bool,
        'actual_power_usable': slot_4_actual_power_usable | bool,
        'actual_discharge': slot_4_actual_discharge_w | float(0),
        'target_age_s': slot_4_target_age_s | float(0),
        'response_grace_s': slot_4_response_grace_s | float(0),
        'discharge_delivery_stalled': slot_4_discharge_delivery_stalled | bool,
        'discharge_locked': slot_4_can_discharge and not (battery_4_target_power_uses_absolute_value | bool and off_peak_active | bool) and not (slot_4_discharge_delivery_stalled | bool) and current_target > 0 and not (discharge_cooldown_ok_4 | bool),
        'charge_locked': slot_4_can_charge and (current_target < 0 or (battery_4_target_power_uses_absolute_value | bool and off_peak_active | bool and current_target > 0)) and not (charge_cooldown_ok_4 | bool)
      }] %}
    {% endif %}
    {{ ns.items }}
  discharge_capable_count: "{{ slot_1_can_discharge | int(0) + slot_2_can_discharge | int(0) + slot_3_can_discharge | int(0) + slot_4_can_discharge | int(0) }}"
  charge_capable_count: "{{ slot_1_can_charge | int(0) + slot_2_can_charge | int(0) + slot_3_can_charge | int(0) + slot_4_can_charge | int(0) }}"
  current_total_charge_w: >-
    {{
      (0 - (slot_1_current_target_w | float(0)) if slot_1_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_2_current_target_w | float(0)) if slot_2_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_3_current_target_w | float(0)) if slot_3_current_target_w | float(0) < 0 else 0)
      + (0 - (slot_4_current_target_w | float(0)) if slot_4_current_target_w | float(0) < 0 else 0)
      + (slot_1_current_target_w | float(0) if off_peak_active | bool and battery_1_target_power_uses_absolute_value | bool and slot_1_current_target_w | float(0) > 0 else 0)
      + (slot_2_current_target_w | float(0) if off_peak_active | bool and battery_2_target_power_uses_absolute_value | bool and slot_2_current_target_w | float(0) > 0 else 0)
      + (slot_3_current_target_w | float(0) if off_peak_active | bool and battery_3_target_power_uses_absolute_value | bool and slot_3_current_target_w | float(0) > 0 else 0)
      + (slot_4_current_target_w | float(0) if off_peak_active | bool and battery_4_target_power_uses_absolute_value | bool and slot_4_current_target_w | float(0) > 0 else 0)
    }}
  current_total_discharge_w: >-
    {{
      (slot_1_current_target_w | float(0) if slot_1_current_target_w | float(0) > 0 and not (off_peak_active | bool and battery_1_target_power_uses_absolute_value | bool) else 0)
      + (slot_2_current_target_w | float(0) if slot_2_current_target_w | float(0) > 0 and not (off_peak_active | bool and battery_2_target_power_uses_absolute_value | bool) else 0)
      + (slot_3_current_target_w | float(0) if slot_3_current_target_w | float(0) > 0 and not (off_peak_active | bool and battery_3_target_power_uses_absolute_value | bool) else 0)
      + (slot_4_current_target_w | float(0) if slot_4_current_target_w | float(0) > 0 and not (off_peak_active | bool and battery_4_target_power_uses_absolute_value | bool) else 0)
    }}
  hold_discharge_mode: >-
    {{ current_total_discharge_w >= control_deadband_w
       and import_need_w < control_deadband_w
       and export_surplus_w < control_deadband_w }}
  hold_charge_mode: >-
    {{ current_total_charge_w >= control_deadband_w
       and export_surplus_w < control_deadband_w
       and import_need_w < control_deadband_w }}

  operating_mode: >-
    {% if not house_power_valid %}
      invalid_sensor
    {% elif off_peak_active | bool %}
      off_peak_charge
    {% elif import_need_w >= control_deadband_w and discharge_capable_count > 0 %}
      discharge
    {% elif hold_discharge_mode %}
      discharge_hold
    {% elif export_surplus_w >= control_deadband_w and charge_capable_count > 0 %}
      charge
    {% elif hold_charge_mode %}
      charge_hold
    {% else %}
      neutral
    {% endif %}

  soft_low_discharge_priority_active: >-
    {% set ns = namespace(active=false) %}
    {% for battery in batteries %}
      {% if battery.soft_low_soc_priority | bool %}
        {% for other in batteries %}
          {% if other.slot != battery.slot
                and other.discharge_available
                and not (other.soft_low_soc_priority | bool)
                and other.soc | float(0) >= battery.soc | float(0) + low_soc_priority_gap_pct | float(0) %}
            {% set ns.active = true %}
          {% endif %}
        {% endfor %}
      {% endif %}
    {% endfor %}
    {{ ns.active }}
  discharge_hold_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge and battery.commanded_discharge | float(0) > 0 %}
        {% set hold = namespace(better_same_cooldown_waiting=false, healthier_waiting=false) %}
        {% for other in batteries %}
          {% if other.slot != battery.slot
                and other.discharge_available
                and other.commanded_discharge | float(0) <= 0
                and other.cooldown_s | float(0) == battery.cooldown_s | float(0)
                and (
                  (other.headroom_priority and not battery.headroom_priority)
                  or (
                    other.headroom_priority == battery.headroom_priority
                    and other.soc | float(0) > battery.soc | float(0)
                  )
                ) %}
            {% set hold.better_same_cooldown_waiting = true %}
          {% endif %}
          {% if other.slot != battery.slot
                and battery.soft_low_soc_priority | bool
                and other.discharge_available
                and not (other.soft_low_soc_priority | bool)
                and other.soc | float(0) >= battery.soc | float(0) + low_soc_priority_gap_pct | float(0) %}
            {% set hold.healthier_waiting = true %}
          {% endif %}
        {% endfor %}
        {% if not hold.better_same_cooldown_waiting and not hold.healthier_waiting %}
          {% set ns.candidates = ns.candidates + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s', reverse=true) }}
  discharge_residual_order: >-
    {% set ns = namespace(headroom=[], regular=[], deferred=[]) %}
    {% for battery in batteries %}
      {% if battery.discharge_available %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set defer = namespace(value=false) %}
          {% if battery.soft_low_soc_priority | bool %}
            {% for other in batteries %}
              {% if other.slot != battery.slot
                    and other.discharge_available
                    and not (other.soft_low_soc_priority | bool)
                    and other.soc | float(0) >= battery.soc | float(0) + low_soc_priority_gap_pct | float(0) %}
                {% set defer.value = true %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% if defer.value %}
            {% set ns.deferred = ns.deferred + [battery] %}
          {% else %}
            {% set ns.regular = ns.regular + [battery] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc', reverse=true))
       + ((ns.regular | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s', reverse=true))
       + ((ns.deferred | sort(attribute='soc', reverse=true)) | sort(attribute='cooldown_s', reverse=true)) }}
  discharge_trim_order: >-
    {% set ns = namespace(regular=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_discharge and battery.commanded_discharge | float(0) > 0 %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ((ns.regular | sort(attribute='soc')) | sort(attribute='cooldown_s'))
       + (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc')) }}
  responsive_discharge_trim_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in discharge_trim_order %}
      {% if battery.responsive | bool and battery.cooldown_s | float(0) > 0 %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  responsive_discharge_trim_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in discharge_trim_order %}
      {% if battery.responsive | bool
            and responsive_discharge_trim_cooldown_s | float(0) > 0
            and battery.cooldown_s | float(0) == responsive_discharge_trim_cooldown_s | float(0) %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ ns.candidates }}
  responsive_charge_absorber_available: >-
    {% set ns = namespace(available=false) %}
    {% for battery in batteries %}
      {% if battery.can_charge
            and battery.responsive | bool
            and battery.cooldown_s | float(0) > 0
            and battery.max_charge | float(0) > battery.current_charge | float(0) %}
        {% set ns.available = true %}
      {% endif %}
    {% endfor %}
    {{ ns.available }}
  responsive_discharge_export_trim_w: >-
    {% if raw_export_w | float(0) <= 0
          or responsive_discharge_trim_cooldown_s | float(0) <= 0 %}
      0
    {% else %}
      {{ [raw_export_w | float(0), control_deadband_w | float(0)] | min }}
    {% endif %}
  cooldown_ready_discharge_export_trim_w: >-
    {% if responsive_charge_absorber_available | bool %}
      0
    {% elif raw_export_w | float(0) < control_deadband_w | float(0) %}
      0
    {% else %}
      {{ [raw_export_w | float(0), control_deadband_w | float(0)] | min }}
    {% endif %}
  responsive_discharge_target_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in batteries %}
      {% if battery.discharge_available
            and battery.responsive | bool
            and battery.cooldown_s | float(0) > 0 %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  charge_order: >-
    {% set ns = namespace(regular=[], headroom=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% if battery.headroom_priority %}
          {% set ns.headroom = ns.headroom + [battery] %}
        {% else %}
          {% set ns.regular = ns.regular + [battery] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ((ns.regular | sort(attribute='soc')) | sort(attribute='cooldown_s'))
       + (ns.headroom | sort(attribute='cooldown_s') | sort(attribute='soc')) }}
  emergency_charge_order: >-
    {% set ns = namespace(candidates=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge %}
        {% set ns.candidates = ns.candidates + [battery] %}
      {% endif %}
    {% endfor %}
    {{ (ns.candidates | sort(attribute='soc')) | sort(attribute='cooldown_s') }}
  responsive_charge_target_cooldown_s: >-
    {% set ns = namespace(cooldowns=[]) %}
    {% for battery in batteries %}
      {% if battery.can_charge
            and battery.responsive | bool
            and battery.cooldown_s | float(0) > 0 %}
        {% set ns.cooldowns = ns.cooldowns + [battery.cooldown_s | float(0)] %}
      {% endif %}
    {% endfor %}
    {% if ns.cooldowns | count > 0 %}
      {{ ns.cooldowns | min }}
    {% else %}
      0
    {% endif %}
  opportunistic_charge_threshold_w: >-
    {% if responsive_charge_target_cooldown_s | float(0) > 0 %}
      {{ control_deadband_w | float(0) }}
    {% else %}
      {{ control_deadband_w | float(0) }}
    {% endif %}

  discharge_plan: >-
    {% set ns = namespace(
      remaining=[(import_need_w | float(0)) - (uncommanded_actual_discharge_w | float(0)), 0] | max,
      trim_remaining=0,
      trimmed_locked_w=0,
      chargeable_raw_export_w=[raw_export_w | float(0) - current_total_discharge_w | float(0), 0] | max,
      export_latency_brake_w=0,
      t1=0,
      t2=0,
      t3=0,
      t4=0,
      responsive_trim_remaining=0,
      cooldown_ready_trim_remaining=0,
      export_latency_brake_remaining=0,
      discharge_increase_budget_remaining=discharge_increase_budget_w | float(0)
    ) %}
    {% if operating_mode in ['discharge', 'discharge_hold'] %}
      {% for battery in discharge_hold_order %}
        {% set allocation = [battery.commanded_discharge, battery.max_discharge] | min %}
        {% set allocation = [allocation, 0] | max %}
        {% set effective_allocation = [battery.current_discharge, allocation] | min %}
        {% if battery.slot == 1 %}
          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
        {% set ns.remaining = [ns.remaining - effective_allocation, 0] | max %}
      {% endfor %}
      {% if operating_mode == 'discharge' %}
        {% for battery in discharge_residual_order %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if ns.remaining > 0
                and not battery.discharge_locked
                and (not battery.charge_locked or battery.responsive) %}
            {% set headroom = [battery.max_discharge - current_allocation, 0] | max %}
            {% set increase_allowed = raw_export_w | float(0) <= 0
                  or not (responsive_charge_absorber_available | bool)
                  or battery.responsive | bool %}
            {% set allocation = [headroom, ns.remaining] | min if increase_allowed else 0 %}
            {% set ramp_step = responsive_discharge_increase_step_w | float(0) if battery.responsive else discharge_increase_step_w | float(0) %}
            {% if house_power_w | float(0) >= strong_import_threshold_w | float(0) %}
              {% set ramp_step = [ramp_step, strong_import_discharge_increase_step_w | float(0)] | max %}
            {% endif %}
            {% set allocation = [allocation, ramp_step, ns.discharge_increase_budget_remaining | float(0)] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation + allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation + allocation) | round(0) %}
            {% endif %}
            {% set ns.remaining = [ns.remaining - allocation, 0] | max %}
            {% set ns.discharge_increase_budget_remaining = [ns.discharge_increase_budget_remaining | float(0) - allocation, 0] | max %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% set ns.trim_remaining = discharge_export_guard_w | float(0) %}
      {% for battery in discharge_trim_order %}
        {% if ns.trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allowed = battery.responsive | bool
                or not (responsive_charge_absorber_available | bool)
                or ns.chargeable_raw_export_w | float(0) < opportunistic_charge_threshold_w | float(0)
                or current_total_charge_w | float(0) >= control_deadband_w | float(0) %}
          {% if current_allocation > 0
                and battery.actual_power_fresh
                and battery.target_age_s | float(0) < battery.response_grace_s | float(0)
                and battery.actual_discharge | float(0) > current_allocation + control_deadband_w | float(0) %}
            {% set pending_actual_drop = [battery.actual_discharge | float(0) - current_allocation, ns.trim_remaining] | min %}
            {% set ns.trim_remaining = [ns.trim_remaining - pending_actual_drop, 0] | max %}
            {% if not trim_is_charge_absorbable %}
              {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - pending_actual_drop, 0] | max %}
            {% endif %}
          {% endif %}
          {% set trim_allocation = [current_allocation, ns.trim_remaining] | min if trim_allowed else 0 %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.trim_remaining = [ns.trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.responsive_trim_remaining = responsive_discharge_export_trim_w | float(0) %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.responsive_trim_remaining > 0 %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.responsive_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if battery.discharge_locked and trim_allocation > 0 %}
            {% set ns.trimmed_locked_w = ns.trimmed_locked_w + trim_allocation %}
          {% endif %}
          {% if trim_allocation > 0 and not battery.discharge_locked and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.responsive_trim_remaining = [ns.responsive_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set responsive_trim_applied = (responsive_discharge_export_trim_w | float(0)) - (ns.responsive_trim_remaining | float(0)) %}
      {% set ns.cooldown_ready_trim_remaining = [(cooldown_ready_discharge_export_trim_w | float(0)) - responsive_trim_applied, 0] | max %}
      {% for battery in discharge_trim_order %}
        {% if ns.cooldown_ready_trim_remaining > 0 and not battery.discharge_locked %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% set trim_is_charge_absorbable = battery.can_charge
                and battery.actual_power_fresh
                and raw_export_w | float(0) > control_deadband_w | float(0)
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
          {% set trim_allocation = [current_allocation, ns.cooldown_ready_trim_remaining] | min %}
          {% if battery.slot == 1 %}
            {% set ns.t1 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 2 %}
            {% set ns.t2 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 3 %}
            {% set ns.t3 = (current_allocation - trim_allocation) | round(0) %}
          {% elif battery.slot == 4 %}
            {% set ns.t4 = (current_allocation - trim_allocation) | round(0) %}
          {% endif %}
          {% if trim_allocation > 0 and not trim_is_charge_absorbable %}
            {% set ns.chargeable_raw_export_w = [ns.chargeable_raw_export_w - trim_allocation, 0] | max %}
          {% endif %}
          {% set ns.cooldown_ready_trim_remaining = [ns.cooldown_ready_trim_remaining - trim_allocation, 0] | max %}
        {% endif %}
      {% endfor %}
      {% set ns.export_latency_brake_remaining = [raw_export_w | float(0) - control_deadband_w | float(0), 0] | max %}
      {% for battery in responsive_discharge_trim_order %}
        {% if ns.export_latency_brake_remaining > 0
              and battery.can_charge
              and battery.actual_power_fresh %}
          {% set current_allocation = 0 %}
          {% if battery.slot == 1 %}
            {% set current_allocation = ns.t1 | float(0) %}
          {% elif battery.slot == 2 %}
            {% set current_allocation = ns.t2 | float(0) %}
          {% elif battery.slot == 3 %}
            {% set current_allocation = ns.t3 | float(0) %}
          {% elif battery.slot == 4 %}
            {% set current_allocation = ns.t4 | float(0) %}
          {% endif %}
          {% if current_allocation > 0
                and battery.actual_discharge | float(0) > control_deadband_w | float(0) %}
            {% set brake_allocation = [current_allocation, ns.export_latency_brake_remaining] | min %}
            {% if battery.slot == 1 %}
              {% set ns.t1 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 2 %}
              {% set ns.t2 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 3 %}
              {% set ns.t3 = (current_allocation - brake_allocation) | round(0) %}
            {% elif battery.slot == 4 %}
              {% set ns.t4 = (current_allocation - brake_allocation) | round(0) %}
            {% endif %}
            {% set ns.export_latency_brake_w = ns.export_latency_brake_w + brake_allocation %}
            {% set ns.export_latency_brake_remaining = [ns.export_latency_brake_remaining - brake_allocation, 0] | max %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {
      'targets': {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4},
      'trimmed_locked_w': ns.trimmed_locked_w | round(0),
      'unresolved_raw_export_w': ns.trim_remaining | round(0),
      'chargeable_raw_export_w': ns.chargeable_raw_export_w | round(0),
      'export_latency_brake_w': ns.export_latency_brake_w | round(0)
    } }}
