          {% set ns.t1 = allocation | round(0) %}
        {% elif battery.slot == 2 %}
          {% set ns.t2 = allocation | round(0) %}
        {% elif battery.slot == 3 %}
          {% set ns.t3 = allocation | round(0) %}
        {% elif battery.slot == 4 %}
          {% set ns.t4 = allocation | round(0) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'1': ns.t1, '2': ns.t2, '3': ns.t3, '4': ns.t4} }}
  neutral_targets: >-
