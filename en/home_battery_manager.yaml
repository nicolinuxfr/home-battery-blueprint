       ) }}
  slot_4_actual_power_usable: >-
    {{ slot_4_actual_power_valid | bool
       and not (slot_4_actual_power_stale | bool) }}
  slot_4_effective_balance_power: >-
    {% set current_target = slot_4_current_target_w | float(0) %}
    {% if current_target == 0 %}
      {% if slot_4_actual_power_usable | bool %}
        {{ (slot_4_actual_discharge_w | float(0)) - (slot_4_actual_charge_w | float(0)) }}
      {% else %}
        0
      {% endif %}
    {% elif not (slot_4_actual_power_sensor_configured | bool) %}
      {{ current_target }}
    {% elif slot_4_actual_power_usable | bool %}
      {{ (slot_4_actual_discharge_w | float(0)) - (slot_4_actual_charge_w | float(0)) }}
    {% elif slot_4_actual_power_stale | bool %}
      {{ current_target }}
    {% else %}
      {{ current_target }}
    {% endif %}
  slot_4_reserved_balance_power: >-
    {% set current_target = slot_4_current_target_w | float(0) %}
    {% if current_target == 0 %}
      {{ slot_4_effective_balance_power | float(0) }}
    {% elif slot_4_target_age_s | float(0) < slot_4_response_grace_s | float(0) %}
      {{ current_target }}
    {% else %}
      {{ slot_4_effective_balance_power | float(0) }}
    {% endif %}
  slot_4_has_discharge_actions: "{{ battery_4_discharge_actions | count > 0 }}"
  slot_4_has_charge_actions: "{{ battery_4_charge_actions | count > 0 }}"
  slot_4_has_night_charge_actions: "{{ battery_4_night_charge_actions | count > 0 }}"
  slot_4_discharge_delivery_stalled: >-
    {% set current_target = slot_4_current_target_w | float(0) %}
