              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_2 | float(0) }}"
              target_discharge_w: "{{ discharge_target_2 | float(0) }}"
              target_charge_w: "{{ charge_target_2 | float(0) }}"
          - alias: "Battery 2: execute night charge action sequence"
            choose: []
            default: !input battery_2_night_charge_actions
  
  - alias: "Battery 3: run night charge actions"
