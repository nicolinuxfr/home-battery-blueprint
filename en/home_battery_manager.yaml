    {% endif %}
  import_need_w: "{{ [adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  export_surplus_w: "{{ [0 - adjusted_house_power_w, 0] | max if house_power_valid else 0 }}"
  discharge_increase_budget_w: >-
