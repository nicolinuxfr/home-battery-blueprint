      {{ [run_started_ts | float(0) - (slot_4_target_last_changed_ts | float(0)), 0] | max }}
    {% else %}
      0
    {% endif %}
  slot_4_response_grace_s: "{{ [20, battery_4_cooldown_seconds | float(0)] | max }}"
  slot_4_current_target_w: >-
    {% if slot_4_target_power_state in ['unknown', 'unavailable', 'none', ''] %}
      0
    {% else %}
      {{ slot_4_target_power_state | float(0) }}
    {% endif %}
  slot_4_current_target_sign: >-
