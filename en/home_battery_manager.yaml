    {% elif slot_4_actual_power_stale | bool %}
      false
    {% elif slot_4_actual_power_usable | bool %}
      {{ actual_discharge <= 50 and (current_target - actual_discharge) > 50 }}
    {% else %}
      false
    {% endif %}
  slot_4_can_discharge: >-
