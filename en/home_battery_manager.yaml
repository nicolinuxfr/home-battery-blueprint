      {{ (house_power_w | float(0)) * (strong_import_discharge_budget_share_pct | float(0)) / 100 }}
    {% else %}
      {{ [house_power_w | float(0) - control_deadband_w | float(0), 0] | max }}
    {% endif %}

  # Generated validation catches missing target entities and zero power limits
  # before any target update or custom action is executed.
  validation_errors: >-
    {% set ns = namespace(errors=[]) %}
    {% if slot_1_used %}
      {% set has_target_entity = slot_1_target_entity_configured | bool %}
      {% set discharge_power_enabled = battery_1_max_discharge_w | float(0) > 0 %}
      {% set charge_power_enabled = battery_1_max_charge_w | float(0) > 0 %}
      {% if not has_target_entity %}
        {% set error_text -%}
          Battery 1 is enabled by its state of charge sensor, but no Target power entity is configured. Add a `number` or `input_number` entity, or clear the state of charge sensor to disable this battery slot.
        {%- endset %}
        {% set ns.errors = ns.errors + [error_text | trim] %}
      {% elif not (discharge_power_enabled or charge_power_enabled) %}
        {% set error_text -%}
          Battery 1 has a target power entity configured, but both maximum power limits are set to 0 W. Set a non-zero Maximum discharge power or Maximum charge power to make this slot usable.
        {%- endset %}
        {% set ns.errors = ns.errors + [error_text | trim] %}
      {% endif %}
    {% endif %}
    
    {% if slot_2_used %}
