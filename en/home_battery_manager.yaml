        'current_discharge': reserved_discharge,
        'current_charge': reserved_charge,
        'actual_power_fresh': slot_1_actual_power_fresh | bool,
        'actual_power_stale': slot_1_actual_power_stale | bool,
        'actual_power_usable': slot_1_actual_power_usable | bool,
        'actual_discharge': slot_1_actual_discharge_w | float(0),
        'target_age_s': slot_1_target_age_s | float(0),
        'response_grace_s': slot_1_response_grace_s | float(0),
