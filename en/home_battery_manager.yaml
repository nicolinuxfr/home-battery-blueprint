              house_power_w: "{{ house_power_w }}"
              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
              off_peak_active: "{{ off_peak_active }}"
              target_power_w: "{{ signed_target_3 | float(0) }}"
              target_discharge_w: "{{ discharge_target_3 | float(0) }}"
              target_charge_w: "{{ charge_target_3 | float(0) }}"
          - alias: "Battery 3: execute night charge action sequence"
            choose: []
            default: !input battery_3_night_charge_actions
  
  - alias: "Battery 4: run night charge actions"
    choose:
      - alias: "Battery 4: night charge actions required"
        conditions:
          - condition: template
            value_template: "{{ should_run_night_charge_actions_4 }}"
        sequence:
          - alias: "Battery 4: prepare night charge action context"
            variables:
              battery_slot: 4
              battery_soc: "{{ slot_4_soc }}"
              house_power_w: "{{ house_power_w }}"
              import_need_w: "{{ import_need_w }}"
              export_surplus_w: "{{ export_surplus_w }}"
