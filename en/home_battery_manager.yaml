       and (signed_target_4 | float(0) - slot_4_current_target_w | float(0)) > [house_power_w | float(0), 0] | max
       and not (discharge_export_guard_active | bool) }}
  should_write_target_power_4: >-
    {% if not slot_4_target_entity_configured %}
      false
    {% elif desired_target_sign_4 | int(0) == 0 %}
      {{ current_target_sign_for_control_4 | int(0) != 0 }}
    {% elif direction_change_blocked_by_cooldown_4 | bool %}
      false
    {% elif desired_target_sign_4 | int(0) != current_target_sign_for_control_4 | int(0)
          and current_target_sign_for_control_4 | int(0) != 0 %}
      true
    {% elif not (target_value_changed_4 | bool) %}
      false
    {% elif same_direction_small_adjustment_4 | bool %}
      false
    {% elif discharge_increase_blocked_by_locked_reduction_4 | bool %}
      false
    {% elif start_from_zero_flow_confirmed_4 | bool %}
      true
    {% elif signed_target_4 | float(0) > 0 %}
      {{ discharge_cooldown_ok_4
         or (discharge_export_guard_active
             and slot_4_current_target_w | float(0) > 0
             and signed_target_4 | float(0) < slot_4_current_target_w | float(0)) }}
    {% elif signed_target_4 | float(0) < 0 %}
      {{ charge_cooldown_ok_4
         or (
           operating_mode == 'off_peak_charge'
           and current_target_sign_for_control_4 | int(0) == 0
         ) }}
    {% else %}
      false
    {% endif %}
  should_run_discharge_actions_4: >-
    {% if not slot_4_has_discharge_actions %}
      false
    {% elif direction_change_blocked_by_cooldown_4 | bool %}
      false
    {% elif signed_target_4 | float(0) <= 0 %}
      {{ (
           current_target_sign_for_control_4 | int(0) == 1
           and target_value_changed_4 | bool
         ) or (
           slot_4_actual_power_usable | bool
           and slot_4_actual_discharge_w | float(0) > control_deadband_w | float(0)
           and discharge_cooldown_ok_4 | bool
         ) }}
    {% elif discharge_increase_blocked_by_locked_reduction_4 | bool %}
      false
    {% elif current_target_sign_for_control_4 | int(0) != 1 %}
      {{ start_from_zero_flow_confirmed_4 | bool
         or (responsive_target_allowed_4 | bool and signed_target_4 | float(0) > 0)
         or current_target_sign_for_control_4 | int(0) != 0 }}
    {% elif not (target_value_changed_4 | bool) %}
      false
    {% elif same_direction_small_adjustment_4 | bool %}
      false
    {% else %}
      {{ discharge_cooldown_ok_4
         or (discharge_export_guard_active
             and slot_4_current_target_w | float(0) > 0
             and signed_target_4 | float(0) < slot_4_current_target_w | float(0)) }}
    {% endif %}
  should_run_charge_actions_4: >-
    {% if not slot_4_has_charge_actions %}
      false
    {% elif operating_mode == 'off_peak_charge' %}
      false
    {% elif direction_change_blocked_by_cooldown_4 | bool %}
      false
    {% elif signed_target_4 | float(0) >= 0 %}
      {{ (
           current_target_sign_for_control_4 | int(0) == -1
           and target_value_changed_4 | bool
         ) or (
           slot_4_actual_power_usable | bool
           and slot_4_actual_charge_w | float(0) > control_deadband_w | float(0)
           and charge_cooldown_ok_4 | bool
         ) }}
    {% elif current_target_sign_for_control_4 | int(0) != -1 %}
      {{ start_from_zero_flow_confirmed_4 | bool
         or (operating_mode == 'off_peak_charge' and charge_cooldown_ok_4 | bool)
         or (responsive_target_allowed_4 | bool and signed_target_4 | float(0) < 0)
         or current_target_sign_for_control_4 | int(0) != 0 }}
    {% elif not (target_value_changed_4 | bool) %}
      false
    {% elif same_direction_small_adjustment_4 | bool %}
      false
    {% else %}
      {{ charge_cooldown_ok_4 }}
    {% endif %}
  should_run_night_charge_actions_4: >-
    {{ slot_4_has_night_charge_actions | bool
       and off_peak_active | bool
       and (
         off_peak_trigger_entered_active | bool
         or triggered_by_start_or_reload | bool
       ) }}
  pending_slot_target_updates: >-
    {{
      (should_write_target_power_1 | bool)
      or (should_write_target_power_2 | bool)
      or (should_write_target_power_3 | bool)
      or (should_write_target_power_4 | bool)
    }}
  pending_slot_actions: >-
    {{
      (should_run_discharge_actions_1 | bool)
      or (should_run_discharge_actions_2 | bool)
      or (should_run_discharge_actions_3 | bool)
      or (should_run_discharge_actions_4 | bool)
      or (should_run_charge_actions_1 | bool)
      or (should_run_charge_actions_2 | bool)
      or (should_run_charge_actions_3 | bool)
      or (should_run_charge_actions_4 | bool)
      or (should_run_night_charge_actions_1 | bool)
      or (should_run_night_charge_actions_2 | bool)
      or (should_run_night_charge_actions_3 | bool)
      or (should_run_night_charge_actions_4 | bool)
    }}
  should_stop_small_house_power_delta: >-
    {{
      (should_skip_small_house_power_delta | bool)
      and not (pending_slot_target_updates | bool)
      and not (pending_slot_actions | bool)
    }}
  run_log_reason: >-
    {% if should_stop_small_house_power_delta %}
      small_delta_skipped
    {% elif operating_mode == 'invalid_sensor' %}
      invalid_sensor
    {% else %}
      {{ operating_mode }}
    {% endif %}
  run_log_slots_json: >-
    {{ {
      '1': {
        'used': slot_1_used | bool,
        'soc': slot_1_soc | float(0),
        'headroom_priority': slot_1_soc | float(0) >= high_soc_headroom_threshold_pct | float(0),
        'cooldown_s': battery_1_cooldown_seconds | float(0),
        'max_discharge_w': battery_1_max_discharge_w | float(0),
        'min_discharge_soc_pct': battery_1_min_discharge_soc_pct | float(0),
        'soft_low_soc_priority': (slot_1_can_discharge | bool) and not (slot_1_discharge_delivery_stalled | bool) and slot_1_soc | float(0) <= battery_1_min_discharge_soc_pct | float(0) + low_soc_priority_margin_pct | float(0),
        'max_charge_w': battery_1_max_charge_w | float(0),
        'current_target_w': slot_1_current_target_w | float(0),
        'signed_target_w': signed_target_1 | float(0),
        'discharge_target_w': discharge_target_1 | float(0),
        'charge_target_w': charge_target_1 | float(0),
        'neutral_target_w': neutral_target_1 | float(0),
        'actual_discharge_w': slot_1_actual_discharge_w | float(0),
        'actual_charge_w': slot_1_actual_charge_w | float(0),
        'actual_power_fresh': slot_1_actual_power_fresh | bool,
        'actual_power_stale': slot_1_actual_power_stale | bool,
        'actual_power_usable': slot_1_actual_power_usable | bool,
        'actual_power_age_s': slot_1_actual_power_age_s | float(999999),
        'target_age_s': slot_1_target_age_s | float(0),
        'response_grace_s': slot_1_response_grace_s | float(0),
        'discharge_delivery_stalled': slot_1_discharge_delivery_stalled | bool,
        'can_charge': slot_1_can_charge | bool,
        'discharge_available': (slot_1_can_discharge | bool) and not (slot_1_discharge_delivery_stalled | bool),
        'discharge_locked': (not (discharge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) > 0 and not (slot_1_discharge_delivery_stalled | bool),
        'charge_locked': (not (charge_cooldown_ok_1 | bool)) and slot_1_current_target_w | float(0) < 0,
        'start_from_zero_flow_confirmed': start_from_zero_flow_confirmed_1 | bool,
        'should_write_target': should_write_target_power_1 | bool,
        'should_run_discharge_actions': should_run_discharge_actions_1 | bool,
