        'soft_low_soc_priority': (slot_2_can_discharge | bool) and not (slot_2_discharge_delivery_stalled | bool) and slot_2_soc | float(0) <= battery_2_min_discharge_soc_pct | float(0) + low_soc_priority_margin_pct | float(0),
        'can_charge': slot_2_can_charge | bool,
        'commanded_discharge': commanded_discharge,
        'commanded_charge': commanded_charge,
        'current_discharge': reserved_discharge,
        'current_charge': reserved_charge,
        'actual_power_fresh': slot_2_actual_power_fresh | bool,
        'actual_power_stale': slot_2_actual_power_stale | bool,
        'actual_power_usable': slot_2_actual_power_usable | bool,
        'actual_discharge': slot_2_actual_discharge_w | float(0),
        'target_age_s': slot_2_target_age_s | float(0),
        'response_grace_s': slot_2_response_grace_s | float(0),
        'discharge_delivery_stalled': slot_2_discharge_delivery_stalled | bool,
        'discharge_locked': slot_2_can_discharge and not (battery_2_target_power_uses_absolute_value | bool and off_peak_active | bool) and not (slot_2_discharge_delivery_stalled | bool) and current_target > 0 and not (discharge_cooldown_ok_2 | bool),
        'charge_locked': slot_2_can_charge and (current_target < 0 or (battery_2_target_power_uses_absolute_value | bool and off_peak_active | bool and current_target > 0)) and not (charge_cooldown_ok_2 | bool)
      }] %}
    {% endif %}
    
    {% if slot_3_used %}
      {% set current_target = slot_3_current_target_w | float(0) %}
      {% if battery_3_target_power_uses_absolute_value | bool and off_peak_active | bool %}
        {% set commanded_discharge = 0 %}
        {% set commanded_charge = [current_target, 0] | max %}
        {% set reserved_discharge = 0 %}
        {% set reserved_charge = [current_target, 0] | max %}
